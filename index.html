<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Login Test - Bhavya Mandir</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fef7e8, #ffe8d6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 28px;
            padding: 40px 35px;
            max-width: 450px;
            width: 90%;
            margin: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
        }
        h2 { color: #FF9933; margin: 15px 0 5px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #FF9933; }
        button {
            width: 100%;
            padding: 14px;
            background: #FF9933;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #e67e22; }
        .error { color: red; margin-top: 15px; font-size: 14px; }
        .success { color: green; margin-top: 15px; font-size: 14px; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="font-size: 60px;">🕉️</div>
        <h2>Bhavya Mandir</h2>
        <p style="opacity: 0.7; margin-bottom: 25px;">Nirman Samiti</p>
        
        <div class="form-group">
            <label>यूजरनेम / Username</label>
            <input type="text" id="username" placeholder="admin / superadmin / operator">
        </div>
        <div class="form-group">
            <label>पासवर्ड / Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="doLogin()">🔐 लॉगिन करें</button>
        
        <div id="message" class="error"></div>
        
        <hr>
        <div style="text-align: left; font-size: 13px; background: #f0f0f0; padding: 12px; border-radius: 12px;">
            <strong>✅ सही लॉगिन जानकारी:</strong><br><br>
            🔑 <strong>admin</strong> / <strong>ramram123</strong><br>
            🔑 <strong>superadmin</strong> / <strong>Bhavya@2026</strong><br>
            🔑 <strong>operator</strong> / <strong>Seva@2026</strong>
        </div>
    </div>

    <script>
        // ==================== USERS DATABASE ====================
        const users = [
            { username: "superadmin", password: "Bhavya@2026", role: "super_admin", name: "राजेंद्र यादव" },
            { username: "admin", password: "ramram123", role: "admin", name: "अरविंद सिंह यादव" },
            { username: "operator", password: "Seva@2026", role: "operator", name: "ऑपरेटर" }
        ];
        
        function doLogin() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const messageDiv = document.getElementById("message");
            
            // Find user
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                messageDiv.style.color = "green";
                messageDiv.innerHTML = `✅ लॉगिन सफल! स्वागत है ${user.name} (${user.role})<br>अब पूरा ऐप लोड होगा...`;
                
                // Save to session
                sessionStorage.setItem("testUser", JSON.stringify(user));
                
                // Show success and redirect after 2 seconds
                setTimeout(() => {
                    alert("लॉगिन सफल! अब पूरा ऐप खुलेगा।\n\nआपका यूजर: " + user.username + "\nरोल: " + user.role);
                    // Here you can redirect to main app or show main content
                    document.body.innerHTML = `<div style="text-align:center; padding:50px;"><h1>✅ लॉगिन सफल!</h1><p>आपका यूजर: ${user.username}</p><p>रोल: ${user.role}</p><button onclick="location.reload()">लॉगआउट करें</button></div>`;
                }, 1000);
            } else {
                messageDiv.style.color = "red";
                messageDiv.innerHTML = "❌ गलत यूजरनेम या पासवर्ड! कृपया सही जानकारी डालें।";
            }
        }
        
        // Check if already logged in
        const savedUser = sessionStorage.getItem("testUser");
        if (savedUser) {
            const user = JSON.parse(savedUser);
            document.body.innerHTML = `<div style="text-align:center; padding:50px;"><h1>✅ आप पहले से लॉगिन हैं!</h1><p>यूजर: ${user.username}</p><p>रोल: ${user.role}</p><button onclick="sessionStorage.clear(); location.reload()">लॉगआउट करें</button></div>`;
        }
    </script>
</body>
</html>
