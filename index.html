<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FF9933">
    <title>🚩 Bhavya Mandir - Temple Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF9933;
            --primary-dark: #e67e22;
            --primary-light: #ffb366;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark-bg: #0f172a;
            --dark-surface: #1e293b;
            --light-bg: #fef7e8;
            --light-surface: #ffffff;
            --text-dark: #1e293b;
            --text-light: #f1f5f9;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light-bg);
            color: var(--text-dark);
            transition: all 0.3s ease;
            min-height: 100vh;
        }
        body.dark {
            background: var(--dark-bg);
            color: var(--text-light);
        }
        body.dark .card, body.dark .modal-content, body.dark .top-bar, body.dark .nav-tabs, body.dark .login-card {
            background: var(--dark-surface);
            color: var(--text-light);
        }
        body.dark input, body.dark select, body.dark textarea {
            background: #334155;
            color: var(--text-light);
            border-color: #475569;
        }
        .app-container { max-width: 1400px; margin: 0 auto; padding: 16px; }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 24px; padding: 20px 24px; margin-bottom: 20px;
            color: white; display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 15px; position: relative; overflow: hidden;
        }
        .header::before { content: "🕉️"; position: absolute; font-size: 100px; opacity: 0.1; right: -10px; bottom: -20px; }
        .header-left { display: flex; align-items: center; gap: 15px; z-index: 1; }
        .temple-logo {
            width: 60px; height: 60px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; cursor: pointer; transition: all 0.3s ease; overflow: hidden;
        }
        .temple-logo:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .temple-logo img { width: 100%; height: 100%; object-fit: cover; }
        .header-text h1 { font-size: 1.4rem; font-weight: bold; }
        .header-text p { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
        .top-bar {
            background: var(--light-surface); border-radius: 16px; padding: 12px 20px;
            margin-bottom: 20px; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .user-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-super-admin { background: #dc2626; color: white; }
        .badge-admin { background: #f59e0b; color: white; }
        .badge-operator { background: #3b82f6; color: white; }
        .badge-viewer { background: #6b7280; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card {
            background: var(--light-surface); border-radius: 20px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .card-icon { font-size: 32px; color: var(--primary); margin-bottom: 12px; }
        .card-title { font-size: 13px; font-weight: 500; opacity: 0.7; margin-bottom: 5px; }
        .card-value { font-size: 28px; font-weight: bold; }
        .nav-tabs {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px;
            background: var(--light-surface); padding: 8px; border-radius: 50px;
        }
        .nav-tab {
            padding: 10px 20px; border: none; background: transparent; border-radius: 40px;
            cursor: pointer; font-weight: 600; transition: all 0.3s ease;
            color: inherit; font-size: 13px;
        }
        .nav-tab.active { background: var(--primary); color: white; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; }
        input, select, textarea {
            width: 100%; padding: 12px 14px; border: 2px solid var(--border);
            border-radius: 12px; font-size: 14px; background: var(--light-surface);
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,153,51,0.1); }
        .btn {
            padding: 10px 22px; border: none; border-radius: 40px; cursor: pointer;
            font-weight: 600; transition: all 0.3s ease; display: inline-flex;
            align-items: center; gap: 8px; font-size: 13px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: scale(0.98); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-warning { background: var(--warning); color: white; }
        .table-container { overflow-x: auto; border-radius: 16px; max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--primary); color: white; font-weight: 600; position: sticky; top: 0; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .badge-paid { background: #d1fae5; color: #065f46; }
        body.dark .badge-paid { background: #064e3b; color: #a7f3d0; }
        .badge-pending { background: #fee2e2; color: #991b1b; }
        body.dark .badge-pending { background: #7f1d1d; color: #fecaca; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center;
            align-items: center; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--light-surface); border-radius: 24px;
            max-width: 90%; width: 500px; max-height: 85vh; overflow-y: auto;
            padding: 24px; animation: modalSlideIn 0.3s ease;
        }
        @keyframes modalSlideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--dark-surface); color: white; padding: 12px 24px;
            border-radius: 50px; z-index: 2100; animation: toastSlide 0.3s ease; font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        @keyframes toastSlide {
            from { bottom: -60px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
        .member-photo {
            width: 45px; height: 45px; border-radius: 50%; object-fit: cover;
            background: var(--primary); display: flex; align-items: center;
            justify-content: center; font-size: 18px; color: white;
        }
        .pending-row { background: rgba(239, 68, 68, 0.08); border-left: 3px solid var(--danger); }
        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .login-card {
            background: var(--light-surface); border-radius: 28px; padding: 40px 35px;
            max-width: 450px; margin: 60px auto; box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
        }
        .social-links {
            display: flex; justify-content: center; gap: 20px; margin: 20px 0;
        }
        .social-icon {
            width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 22px; transition: all 0.3s ease; cursor: pointer;
        }
        .social-icon:hover { transform: scale(1.1); }
        .social-wa { background: #25D366; color: white; }
        .social-tg { background: #0088cc; color: white; }
        .social-fb { background: #1877f2; color: white; }
        .social-ig { background: #e4405f; color: white; }
        .social-yt { background: #ff0000; color: white; }
        .year-selector {
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
            margin-bottom: 20px; padding: 15px; background: var(--light-surface);
            border-radius: 16px;
        }
        .about-section {
            display: flex; flex-direction: column; gap: 20px;
        }
        .about-text {
            line-height: 1.8; font-size: 15px;
        }
        @media (max-width: 768px) {
            .app-container { padding: 12px; }
            .header-text h1 { font-size: 1rem; }
            .nav-tab { padding: 8px 12px; font-size: 11px; }
            .card-value { font-size: 22px; }
            .login-card { margin: 30px 16px; padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="login-card">
            <div style="font-size: 60px;">🕉️</div>
            <h2 style="color: var(--primary); margin-top: 10px; font-size: 1.5rem;">Bhavya Mandir</h2>
            <p style="opacity: 0.7; margin-bottom: 25px;">Nirman Samiti</p>
            
            <div class="form-group">
                <label>यूजरनेम / Username</label>
                <input type="text" id="loginUsername" placeholder="superadmin / admin / operator">
            </div>
            <div class="form-group">
                <label>पासवर्ड / Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="doLogin()" style="width: 100%; justify-content: center;">🔐 लॉगिन करें</button>
            
            <div style="margin-top: 20px; text-align: center;">
                <a href="#" onclick="showForgotPassword()" style="color: var(--primary); font-size: 13px;">पासवर्ड भूल गए?</a>
            </div>
            
            <div style="margin-top: 25px; padding: 12px; background: rgba(255,153,51,0.1); border-radius: 12px;">
                <p style="font-size: 12px; font-weight: 600;">📢 डिफॉल्ट लॉगिन</p>
                <p style="font-size: 11px; margin-top: 5px;">superadmin | admin | operator</p>
            </div>
        </div>
    </div>

    <div class="app-container" id="mainApp" style="display: none;">
        <div class="header">
            <div class="header-left">
                <div class="temple-logo" id="templeLogo" onclick="changeLogo()"><i class="fas fa-temple"></i></div>
                <div class="header-text">
                    <h1 id="committeeName">🚩 Bhavya Mandir Nirman Samiti</h1>
                    <p id="committeeBanner">गुलाबपुरा, मोहनगढ़</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="lang-btn" onclick="toggleLanguage()" style="background: rgba(255,255,255,0.2); padding: 8px 14px; border-radius: 40px; cursor: pointer;">🌐 हिंदी</div>
                <div class="dark-toggle" onclick="toggleDarkMode()" style="background: rgba(255,255,255,0.2); padding: 8px 14px; border-radius: 40px; cursor: pointer;">🌙</div>
            </div>
        </div>
        
        <div class="top-bar">
            <div><i class="fas fa-user-circle"></i> <span id="userName" style="font-weight: 600;">Loading...</span> <span class="user-badge" id="userRoleBadge"></span></div>
            <div><i class="fas fa-key" onclick="showChangePassword()" style="cursor: pointer;"></i> <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor: pointer; margin-left: 15px;"></i></div>
        </div>
        
        <div class="nav-tabs" id="navTabs">
            <button class="nav-tab active" data-tab="dashboard">🏠 डैशबोर्ड</button>
            <button class="nav-tab" data-tab="members">👥 दानदाता</button>
            <button class="nav-tab" data-tab="payments">💰 भुगतान</button>
            <button class="nav-tab" data-tab="pending">⏰ बकाया</button>
            <button class="nav-tab" data-tab="incomeExpense">📈 आय-व्यय</button>
            <button class="nav-tab" data-tab="committee">🏛️ समिति</button>
            <button class="nav-tab" data-tab="expenses">📉 खर्च</button>
            <button class="nav-tab" data-tab="social">🌐 संपर्क करें</button>
            <button class="nav-tab" data-tab="about">ℹ️ समिति के बारे में</button>
            <button class="nav-tab" data-tab="users">👑 यूजर</button>
            <button class="nav-tab" data-tab="settings">⚙️ सेटिंग्स</button>
        </div>
        
        <div id="pageContent"></div>
    </div>

    <div class="modal" id="modal"><div class="modal-content"><div id="modalBody"></div><div style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;"><button class="btn btn-outline" onclick="closeModal()">रद्द करें</button><button class="btn btn-primary" id="modalConfirmBtn">पुष्टि करें</button></div></div></div>

    <script>
        // ==================== LANGUAGE ====================
        let currentLang = "hi";
        const translations = {
            hi: {
                dashboard: "🏠 डैशबोर्ड", members: "👥 दानदाता", payments: "💰 भुगतान", pending: "⏰ बकाया",
                incomeExpense: "📈 आय-व्यय", committee: "🏛️ समिति", expenses: "📉 खर्च", social: "🌐 संपर्क करें",
                about: "ℹ️ समिति के बारे में", users: "👑 यूजर", settings: "⚙️ सेटिंग्स",
                totalDonors: "कुल दानदाता", totalIncome: "कुल आय", totalPending: "कुल बकाया", totalExpense: "कुल व्यय",
                netBalance: "नेट बैलेंस", pendingDonors: "बकाया दानदाता", addDonor: "दानदाता जोड़ें", addPayment: "भुगतान जोड़ें",
                name: "नाम", mobile: "मोबाइल", village: "गांव", monthlyAmount: "मासिक राशि", status: "स्थिति", actions: "कार्य",
                paid: "जमा", pending_status: "बकाया", collectPayment: "जमा करें", sendReminder: "रिमाइंडर", receipt: "रसीद",
                edit: "संपादित करें", delete: "हटाएं", view: "देखें", save: "सेव करें", cancel: "रद्द करें", confirm: "पुष्टि करें",
                login: "लॉगिन", username: "यूजरनेम", password: "पासवर्ड", forgotPassword: "पासवर्ड भूल गए?", changePassword: "पासवर्ड बदलें"
            },
            en: {
                dashboard: "🏠 Dashboard", members: "👥 Donors", payments: "💰 Payments", pending: "⏰ Pending",
                incomeExpense: "📈 Income-Expense", committee: "🏛️ Committee", expenses: "📉 Expenses", social: "🌐 Contact Us",
                about: "ℹ️ About", users: "👑 Users", settings: "⚙️ Settings",
                totalDonors: "Total Donors", totalIncome: "Total Income", totalPending: "Total Pending", totalExpense: "Total Expense",
                netBalance: "Net Balance", pendingDonors: "Pending Donors", addDonor: "Add Donor", addPayment: "Add Payment",
                name: "Name", mobile: "Mobile", village: "Village", monthlyAmount: "Monthly Amount", status: "Status", actions: "Actions",
                paid: "Paid", pending_status: "Pending", collectPayment: "Collect", sendReminder: "Reminder", receipt: "Receipt",
                edit: "Edit", delete: "Delete", view: "View", save: "Save", cancel: "Cancel", confirm: "Confirm",
                login: "Login", username: "Username", password: "Password", forgotPassword: "Forgot Password?", changePassword: "Change Password"
            }
        };
        function t(key) { return translations[currentLang][key] || translations.hi[key] || key; }

        // ==================== DATA ====================
        let currentTab = "dashboard";
        let currentYear = new Date().getFullYear();
        
        let appData = {
            settings: {
                committeeName: "🚩 Bhavya Mandir Nirman Samiti",
                committeeBanner: "गुलाबपुरा, मोहनगढ़",
                upiId: "asryadavtkg@ybl",
                presidentName: "राजेंद्र यादव",
                secretaryName: "अरविंद सिंह यादव",
                defaultMonthlyAmount: 200,
                darkMode: false,
                logo: "",
                currentCommitteeYear: "2025-26",
                whatsappLink: "https://chat.whatsapp.com/",
                telegramLink: "https://t.me/",
                facebookLink: "https://facebook.com/",
                instagramLink: "https://instagram.com/",
                youtubeLink: "https://youtube.com/",
                aboutText: "🚩 भव्य मंदिर निर्माण समिति का स्थापना 2020 में हुई थी। हमारा उद्देश्य भव्य मंदिर का निर्माण करना और समाज सेवा करना है।"
            },
            committeeMembers: [
                { id: 1, name: "राजेंद्र यादव", position: "अध्यक्ष", mobile: "9876543210", year: "2025-26", photo: "" },
                { id: 2, name: "अरविंद सिंह यादव", position: "सचिव", mobile: "9876543211", year: "2025-26", photo: "" }
            ],
            members: [],
            payments: [],
            expenses: [],
            users: [
                { id: 1, username: "superadmin", password: btoa("Bhavya@2026"), role: "super_admin", name: "राजेंद्र यादव" },
                { id: 2, username: "admin", password: btoa("Mandir@2026"), role: "admin", name: "अरविंद सिंह यादव" },
                { id: 3, username: "operator", password: btoa("Seva@2026"), role: "operator", name: "ऑपरेटर" },
                { id: 4, username: "viewer", password: btoa("View@2026"), role: "viewer", name: "दर्शक" }
            ],
            currentUser: null
        };

        const monthNames = ["जनवरी", "फरवरी", "मार्च", "अप्रैल", "मई", "जून", "जुलाई", "अगस्त", "सितंबर", "अक्टूबर", "नवंबर", "दिसंबर"];
        const years = [2023, 2024, 2025, 2026, 2027, 2028, 2029, 2030];

        // ==================== INIT ====================
        function init() {
            loadData();
            applyTheme();
            document.getElementById("loginContainer").style.display = "flex";
            document.getElementById("mainApp").style.display = "none";
        }

        function loadData() {
            const saved = localStorage.getItem("templeAppData");
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    appData = { ...appData, ...parsed };
                } catch(e) { console.log("Error loading data"); }
            }
            
            if (appData.members.length === 0) {
                appData.members = [
                    { id: 1, name: "राम प्रसाद", fatherName: "सीता राम", mobile: "9876543210", village: "अयोध्या", address: "मंदिर के पास", monthlyAmount: 200, joinDate: "2024-01-01", photo: "" },
                    { id: 2, name: "हरि शंकर", fatherName: "राम शंकर", mobile: "9876543211", village: "वृंदावन", address: "मेन बाजार", monthlyAmount: 100, joinDate: "2024-01-15", photo: "" }
                ];
            }
            
            if (appData.payments.length === 0) {
                const currentDate = new Date();
                appData.members.forEach(member => {
                    for (let m = 0; m <= currentDate.getMonth(); m++) {
                        appData.payments.push({
                            id: Date.now() + m + member.id,
                            memberId: member.id,
                            memberName: member.name,
                            month: monthNames[m],
                            monthIndex: m,
                            year: 2025,
                            amountPaid: m === 0 ? member.monthlyAmount : 0,
                            pendingAmount: m === 0 ? 0 : member.monthlyAmount,
                            status: m === 0 ? "Paid" : "Pending",
                            receiptNo: m === 0 ? `BHAVYA-2025-${member.id}` : "",
                            paymentDate: m === 0 ? "2025-01-15" : "",
                            paymentMode: m === 0 ? "UPI" : ""
                        });
                    }
                });
            }
            
            if (appData.expenses.length === 0) {
                appData.expenses = [
                    { id: 1, category: "निर्माण", amount: 5000, description: "मंदिर नवीनीकरण", date: "2025-01-10", year: 2025, month: "जनवरी" }
                ];
            }
            saveData();
        }

        function saveData() { localStorage.setItem("templeAppData", JSON.stringify(appData)); }

        // ==================== AUTHENTICATION ====================
        function doLogin() {
            const username = document.getElementById("loginUsername").value;
            const password = document.getElementById("loginPassword").value;
            const user = appData.users.find(u => u.username === username && atob(u.password) === password);
            if (user) {
                appData.currentUser = { ...user, password: undefined };
                sessionStorage.setItem("currentUser", JSON.stringify(appData.currentUser));
                document.getElementById("loginContainer").style.display = "none";
                document.getElementById("mainApp").style.display = "block";
                updateUserDisplay();
                setupEventListeners();
                renderCurrentPage();
                showToast("✅ लॉगिन सफल! स्वागत है " + user.name);
            } else {
                alert("❌ गलत यूजरनेम या पासवर्ड!");
            }
        }

        function checkAuth() {
            const savedUser = sessionStorage.getItem("currentUser");
            if (savedUser) {
                appData.currentUser = JSON.parse(savedUser);
                document.getElementById("loginContainer").style.display = "none";
                document.getElementById("mainApp").style.display = "block";
                updateUserDisplay();
                setupEventListeners();
                renderCurrentPage();
                return true;
            }
            return false;
        }

        function updateUserDisplay() {
            document.getElementById("userName").innerText = appData.currentUser?.name || appData.currentUser?.username;
            const badge = document.getElementById("userRoleBadge");
            if (appData.currentUser?.role === "super_admin") {

        function hasPermission(action) {
            if (!appData.currentUser) return false;
            const role = appData.currentUser.role;
            if (role === "super_admin") return true;
            if (role === "admin") return ["view", "add", "edit", "delete", "manage_users", "manage_settings", "add_payment", "add_member", "edit_payment", "manage_committee"].includes(action);
            if (role === "operator") return ["view", "add_payment", "add_member"].includes(action);
            if (role === "viewer") return ["view"].includes(action);
            return false;
        }

            const message = `🚩 *जय श्री राम* 🚩\n\nआदरणीय *${member.name} जी*,\nआपका मासिक दान बकाया है।\n\n💰 *कुल बकाया: ₹${totalPending}*\n💸 *UPI: ${appData.settings.upiId}*\n\n👇 *भुगतान यहाँ करें:*\nupi://pay?pa=${appData.settings.upiId}&pn=${encodeURIComponent(member.name)}&am=${totalPending}&cu=INR\n\nभवदीय,\n${appData.settings.presidentName}`;
            if(member.mobile && member.mobile.length === 10) { window.open(`https://wa.me/91${member.mobile}?text=${encodeURIComponent(message)}`, '_blank'); }
            else { alert("⚠️ मोबाइल नंबर सही नहीं है!"); }
        }

        function sendBulkReminders() {
            const pendingMembers = appData.members.filter(m => appData.payments.some(p => p.memberId === m.id && p.status === "Pending"));

        function resetAllData() { if(confirm("⚠️ सभी डेटा डिलीट हो जाएगा!")) { localStorage.removeItem("templeAppData"); location.reload(); } }

        // ==================== HELPER FUNCTIONS ====================
        function setupEventListeners() { document.querySelectorAll('.nav-tab').forEach(tab => { tab.addEventListener('click', () => { currentTab = tab.dataset.tab; document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); renderCurrentPage(); }); }); }
        function switchTab(tabName) { currentTab = tabName; renderCurrentPage(); }
        function renderCurrentPage() {
            switch(currentTab) {
                case "dashboard": renderDashboard(); break;
                case "members": renderMembers(); break;
                case "payments": renderPayments(); break;
                case "pending": renderPending(); break;
                case "incomeExpense": renderIncomeExpense(); break;
                case "committee": renderCommittee(); break;
                case "expenses": renderExpenses(); break;
                case "social": renderSocial(); break;
                case "about": renderAbout(); break;
                case "users": renderUsers(); break;
                case "settings": renderSettings(); break;
                default: renderDashboard();
            }
        }
        function toggleDarkMode() { document.body.classList.toggle('dark'); appData.settings.darkMode = document.body.classList.contains('dark'); saveData(); }
        function applyTheme() { if(appData.settings.darkMode) document.body.classList.add('dark'); if(appData.settings.logo) document.getElementById("templeLogo").innerHTML = `<img src="${appData.settings.logo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`; }
        function closeModal() { document.getElementById("modal").style.display = "none"; window.tempPhoto = null; }
        function showToast(message) { let toast = document.querySelector('.toast'); if(toast) toast.remove(); toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = message; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }

        // ==================== PENDING PAGE ====================
        function renderPending() {
            const pendingMembers = appData.members.filter(m => appData.payments.some(p => p.memberId === m.id && p.status === "Pending"));
            const html = `<div class="card"><h3>⚠️ बकाया दानदाता (${pendingMembers.length})</h3>
                <button class="btn btn-primary" onclick="sendBulkReminders()"><i class="fab fa-whatsapp"></i> सभी को WhatsApp भेजें</button></div>
                ${pendingMembers.map(member => {
                    const pendingPayments = appData.payments.filter(p => p.memberId === member.id && p.status === "Pending");
                    const totalPending = pendingPayments.reduce((s,p) => s + p.pendingAmount, 0);
                    return `<div class="card" style="margin-top:16px; border-left: 4px solid var(--danger);"><div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                        <div><h4>${member.name}</h4><p>📱 ${member.mobile} | मासिक: ₹${member.monthlyAmount}</p><p><strong>कुल बकाया: ₹${totalPending}</strong> | ${pendingPayments.length} महीने</p></div>
                        <div><button class="btn btn-success" onclick="showPaymentForMember(${member.id})">जमा करें</button>
                        <button class="btn btn-primary" onclick="sendReminderToMember(${member.id})"><i class="fab fa-whatsapp"></i> रिमाइंडर</button></div></div>
                        <div class="table-container"><td><thead><tr><th>महीना</th><th>बकाया</th><th>कार्य</th></tr></thead>
                        <tbody>${pendingPayments.map(p => `<tr><td class="pending-row">${p.month} ${p.year} <td class="pending-row">₹${p.pendingAmount} <td class="pending-row"><button class="btn btn-success" onclick="collectPayment(${p.id})">जमा करें</button> </tr>`).join('')}</tbody>}</div></div>`;
                }).join('')}
                ${pendingMembers.length === 0 ? '<div class="card"><h3>🎉 सभी दानदाताओं ने भुगतान कर दिया है!</h3></div>' : ''}`;
            document.getElementById("pageContent").innerHTML = html;
        }

        function showPaymentForMember(memberId) {
            const member = appData.members.find(m => m.id === memberId);
            const pendingPayments = appData.payments.filter(p => p.memberId === memberId && p.status === "Pending");
            if(pendingPayments.length === 0) return;
            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `<h3>💰 ${member.name} के लिए भुगतान</h3><p>मासिक राशि: ₹${member.monthlyAmount}</p>
                <div class="form-group"><label>महीना</label><select id="monthSelect">${pendingPayments.map(p => `<option value="${p.id}">${p.month} ${p.year} - बकाया ₹${p.pendingAmount}</option>`).join('')}</select></div>
                <div class="form-group"><label>जमा राशि (₹)</label><input type="number" id="paymentAmount" value="${pendingPayments[0].pendingAmount}"></div>
                <div class="form-group"><label>भुगतान मोड</label><select id="paymentMode"><option>नकद</option><option>UPI</option><option>बैंक ट्रांसफर</option></select></div>`;
            document.getElementById("modalConfirmBtn").onclick = () => {
                const paymentId = parseInt(document.getElementById("monthSelect").value);
                const payment = appData.payments.find(p => p.id === paymentId);
                const amount = parseFloat(document.getElementById("paymentAmount").value);
                if(payment && amount > 0) {
                    payment.amountPaid += amount; payment.pendingAmount = Math.max(0, payment.pendingAmount - amount); payment.status = payment.pendingAmount <= 0 ? "Paid" : "Pending";
                    payment.receiptNo = `BHAVYA-${payment.year}-${payment.memberId}-${Date.now()}`; payment.paymentDate = new Date().toISOString().split('T')[0]; payment.paymentMode = document.getElementById("paymentMode").value;
                    saveData(); generateReceiptAndSend(member, payment, amount); closeModal(); renderPending(); alert("✅ भुगतान जमा हो गया!");
                }
            };
            document.getElementById("modal").style.display = "flex";
        }

        function collectPayment(paymentId) {
            const payment = appData.payments.find(p => p.id === paymentId);
            if(!payment) return;
            const member = appData.members.find(m => m.id === payment.memberId);
            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `<h3>💰 ${t("collectPayment")}</h3><p><strong>दानदाता:</strong> ${member?.name}</p><p><strong>महीना:</strong> ${payment.month} ${payment.year}</p><p><strong>बकाया राशि:</strong> ₹${payment.pendingAmount}</p>
                <div class="form-group"><label>जमा राशि (₹)</label><input type="number" id="collectAmount" value="${payment.pendingAmount}"></div>
                <div class="form-group"><label>भुगतान मोड</label><select id="mode"><option>नकद</option><option>UPI</option><option>बैंक ट्रांसफर</option></select></div>`;
            document.getElementById("modalConfirmBtn").onclick = () => {
                const collectAmount = parseFloat(document.getElementById("collectAmount").value);
                payment.amountPaid += collectAmount; payment.pendingAmount = Math.max(0, payment.pendingAmount - collectAmount); payment.status = payment.pendingAmount <= 0 ? "Paid" : "Pending";
                payment.receiptNo = `BHAVYA-${payment.year}-${payment.memberId}-${Date.now()}`; payment.paymentDate = new Date().toISOString().split('T')[0]; payment.paymentMode = document.getElementById("mode").value;
                saveData(); closeModal(); renderPayments(); generateReceiptAndSend(member, payment, collectAmount); alert("✅ भुगतान जमा हो गया!");
            };
            document.getElementById("modal").style.display = "flex";
        }

        function showAddPaymentModal() {
            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `<h3>💰 ${t("addPayment")}</h3>
                <div class="form-group"><label>दानदाता</label><select id="memberId">${appData.members.map(m => `<option value="${m.id}">${m.name} (मासिक: ₹${m.monthlyAmount})</option>`).join('')}</select></div>
                <div class="form-group"><label>महीना</label><select id="month">${monthNames.map((m, i) => `<option value="${i}">${m}</option>`).join('')}</select></div>
                <div class="form-group"><label>साल</label><select id="year">${years.map(y => `<option value="${y}" ${y === new Date().getFullYear() ? 'selected' : ''}>${y}</option>`).join('')}</select></div>
                <div class="form-group"><label>जमा राशि (₹)</label><input type="number" id="amount"></div>
                <div class="form-group"><label>भुगतान मोड</label><select id="mode"><option>नकद</option><option>UPI</option><option>बैंक ट्रांसफर</option></select></div>`;
            document.getElementById("modalConfirmBtn").onclick = () => {
                const memberId = parseInt(document.getElementById("memberId").value);
                const member = appData.members.find(m => m.id === memberId);
                const monthIndex = parseInt(document.getElementById("month").value);
                const month = monthNames[monthIndex];
                const year = parseInt(document.getElementById("year").value);
                const amount = parseFloat(document.getElementById("amount").value);
                const receiptNo = `BHAVYA-${year}-${memberId}-${Date.now()}`;
                const paymentDate = new Date().toISOString().split('T')[0];
                
                let payment = appData.payments.find(p => p.memberId === memberId && p.year === year && p.monthIndex === monthIndex);
                if(payment) { payment.amountPaid += amount; payment.pendingAmount = Math.max(0, member.monthlyAmount - payment.amountPaid); payment.status = payment.pendingAmount <= 0 ? "Paid" : "Pending"; payment.receiptNo = receiptNo; payment.paymentDate = paymentDate; payment.paymentMode = document.getElementById("mode").value; }
                else { payment = { id: Date.now(), memberId, memberName: member.name, month, monthIndex, year, amountPaid: amount, pendingAmount: Math.max(0, member.monthlyAmount - amount), status: amount >= member.monthlyAmount ? "Paid" : "Pending", receiptNo, paymentDate, paymentMode: document.getElementById("mode").value }; appData.payments.push(payment); }
                saveData(); closeModal(); renderPayments(); generateReceiptAndSend(member, payment, amount); alert("✅ भुगतान दर्ज हो गया!");
            };
            document.getElementById("modal").style.display = "flex";
        }

        function editPayment(paymentId) {
            if (!hasPermission("edit_payment")) { alert("❌ केवल एडमिन ही सुधार सकता है!"); return; }
            const payment = appData.payments.find(p => p.id === paymentId);
            if(!payment) return;
            const member = appData.members.find(m => m.id === payment.memberId);
            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `<h3>✏️ गलत राशि सुधारें</h3><p><strong>दानदाता:</strong> ${member?.name}</p><p><strong>महीना:</strong> ${payment.month} ${payment.year}</p>
                <div class="form-group"><label>जमा राशि (₹)</label><input type="number" id="editAmount" value="${payment.amountPaid}"></div>`;
            document.getElementById("modalConfirmBtn").onclick = () => {
                payment.amountPaid = parseFloat(document.getElementById("editAmount").value);
                payment.pendingAmount = Math.max(0, (member?.monthlyAmount || 200) - payment.amountPaid);
                payment.status = payment.pendingAmount <= 0 ? "Paid" : "Pending";
                saveData(); closeModal(); renderPayments(); alert("✅ राशि सुधार दी गई!");
            };
            document.getElementById("modal").style.display = "flex";
        }

        function viewMember(id) {
            const member = appData.members.find(m => m.id === id);
            const memberPayments = appData.payments.filter(p => p.memberId === id);
            const totalPaid = memberPayments.filter(p => p.status === "Paid").reduce((s,p) => s + p.amountPaid, 0);
            const totalPending = memberPayments.filter(p => p.status === "Pending").reduce((s,p) => s + p.pendingAmount, 0);
            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `<h3>👤 दानदाता प्रोफाइल</h3><div style="text-align:center;"><div class="member-photo" style="width:80px;height:80px;margin:0 auto 15px;font-size:32px;">${member.photo ? `<img src="${member.photo}" style="width:100%;height:100%;border-radius:50%;">` : member.name.charAt(0)}</div></div>
                <p><strong>${t("name")}:</strong> ${member.name}</p><p><strong>पिता:</strong> ${member.fatherName || '-'}</p><p><strong>${t("mobile")}:</strong> ${member.mobile}</p><p><strong>${t("monthlyAmount")}:</strong> ₹${member.monthlyAmount}</p>
                <p><strong>जॉइन तिथि:</strong> ${member.joinDate}</p><p><strong>कुल जमा:</strong> ₹${totalPaid}</p><p><strong>कुल बकाया:</strong> ₹${totalPending}</p>
                <hr><h4>भुगतान इतिहास</h4><div class="table-container"><table style="font-size:12px;"><thead><tr><th>महीना</th><th>जमा राशि</th><th>बकाया</th><th>स्थिति</th><th>रसीद</th></tr></thead>
                <tbody>${memberPayments.map(p => `<tr><td class="${p.status === 'Pending' ? 'pending-row' : ''}">${p.month} ${p.year} <td class="${p.status === 'Pending' ? 'pending-row' : ''}">₹${p.amountPaid} <td class="${p.status === 'Pending' ? 'pending-row' : ''}">₹${p.pendingAmount}
                <td><span class="badge ${p.status === 'Paid' ? 'badge-paid' : 'badge-pending'}">${p.status === 'Paid' ? 'जमा' : 'बकाया'}</span></td>
                <td>${p.receiptNo ? `<button class="btn btn-primary" onclick="generateReceiptForPayment(${p.id})" style="padding:2px 8px;">PDF</button>` : '-'} </tr>`).join('')}</tbody>}</div>`;
            document.getElementById("modalConfirmBtn").style.display = "none";
            document.getElementById("modal").style.display = "flex";
        }

        function editMember(id) {
            const member = appData.members.find(m => m.id === id);
            if(!member) return;
            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `<h3>✏️ ${t("edit")}</h3><div class="form-group"><label>${t("name")}</label><input type="text" id="memberName" value="${member.name}"></div>
                <div class="form-group"><label>पिता का नाम</label><input type="text" id="fatherName" value="${member.fatherName || ''}"></div>
                <div class="form-group"><label>${t("mobile")}</label><input type="text" id="mobile" value="${member.mobile}"></div>
                <div class="form-group"><label>${t("monthlyAmount")} (₹)</label><input type="number" id="monthlyAmount" value="${member.monthlyAmount}"></div>
                <div class="form-group"><label>फोटो</label><input type="file" id="photoInput" accept="image/*"></div><div id="photoPreview">${member.photo ? `<img src="${member.photo}" style="width:80px;height:80px;border-radius:50%;">` : ''}</div>`;
            document.getElementById("photoInput")?.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if(file) { const reader = new FileReader(); reader.onload = (ev) => { document.getElementById("photoPreview").innerHTML = `<img src="${ev.target.result}" style="width:80px;height:80px;border-radius:50%;">`; window.tempPhoto = ev.target.result; }; reader.readAsDataURL(file); }
            });
            document.getElementById("modalConfirmBtn").onclick = () => {
                member.name = document.getElementById("memberName").value;
                member.fatherName = document.getElementById("fatherName").value;
                member.mobile = document.getElementById("mobile").value;
                member.monthlyAmount = parseInt(document.getElementById("monthlyAmount").value);
                if(window.tempPhoto) member.photo = window.tempPhoto;
                saveData(); closeModal(); renderMembers(); alert("✅ दानदाता अपडेट हुआ!");
            };
            document.getElementById("modal").style.display = "flex";
        }

        function deleteMember(id) {
            if(confirm("दानदाता हटाएं?")) { appData.members = appData.members.filter(m => m.id !== id); appData.payments = appData.payments.filter(p => p.memberId !== id); saveData(); renderMembers(); alert("✅ दानदाता हट गया!"); }
        }

        function showAddMemberModal() {
            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `<h3>➕ ${t("addDonor")}</h3><div class="form-group"><label>${t("name")} *</label><input type="text" id="memberName"></div>
                <div class="form-group"><label>पिता का नाम</label><input type="text" id="fatherName"></div>
                <div class="form-group"><label>${t("mobile")} *</label><input type="tel" id="mobile"></div>
                <div class="form-group"><label>${t("village")}</label><input type="text" id="village"></div>
                <div class="form-group"><label>पता</label><textarea id="address" rows="2"></textarea></div>
                <div class="form-group"><label>${t("monthlyAmount")} (₹)</label><input type="number" id="monthlyAmount" value="${appData.settings.defaultMonthlyAmount}"></div>
                <div class="form-group"><label>जॉइन तिथि</label><input type="date" id="joinDate" value="${new Date().toISOString().split('T')[0]}"></div>
                <div class="form-group"><label>फोटो</label><input type="file" id="photoInput" accept="image/*"></div><div id="photoPreview"></div>`;
            document.getElementById("photoInput")?.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if(file) { const reader = new FileReader(); reader.onload = (ev) => { document.getElementById("photoPreview").innerHTML = `<img src="${ev.target.result}" style="width:80px;height:80px;border-radius:50%;">`; window.tempPhoto = ev.target.result; }; reader.readAsDataURL(file); }
            });
            document.getElementById("modalConfirmBtn").onclick = () => {
                if(!document.getElementById("memberName").value || !document.getElementById("mobile").value) { alert("नाम और मोबाइल जरूरी है!"); return; }
                const newMember = { id: Date.now(), name: document.getElementById("memberName").value, fatherName: document.getElementById("fatherName").value, mobile: document.getElementById("mobile").value, village: document.getElementById("village").value, address: document.getElementById("address").value, monthlyAmount: parseInt(document.getElementById("monthlyAmount").value), joinDate: document.getElementById("joinDate").value, photo: window.tempPhoto || "" };
                appData.members.push(newMember);
                const currentDate = new Date();
                for (let m = 0; m <= currentDate.getMonth(); m++) { appData.payments.push({ id: Date.now() + m, memberId: newMember.id, memberName: newMember.name, month: monthNames[m], monthIndex: m, year: currentDate.getFullYear(), amountPaid: 0, pendingAmount: newMember.monthlyAmount, status: "Pending", receiptNo: "", paymentDate: "", paymentMode: "" }); }
                saveData(); closeModal(); renderMembers(); alert("✅ दानदाता जुड़ गया!");
            };
            document.getElementById("modal").style.display = "flex";
        }

        // Start App
        init();
        checkAuth();
    </script>
</body>
    </html>
