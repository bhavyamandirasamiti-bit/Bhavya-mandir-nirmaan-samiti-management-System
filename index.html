<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FF9933">
    <title>🚩 Bhavya Mandir - Complete Temple Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF9933;
            --primary-dark: #e67e22;
            --primary-light: #ffb366;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark-bg: #0f172a;
            --dark-surface: #1e293b;
            --light-bg: #fef7e8;
            --light-surface: #ffffff;
            --text-dark: #1e293b;
            --text-light: #f1f5f9;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light-bg);
            color: var(--text-dark);
            transition: all 0.3s ease;
            min-height: 100vh;
        }
        body.dark {
            background: var(--dark-bg);
            color: var(--text-light);
        }
        body.dark .card, body.dark .modal-content, body.dark .top-bar, body.dark .nav-tabs, body.dark .login-card {
            background: var(--dark-surface);
            color: var(--text-light);
        }
        body.dark input, body.dark select, body.dark textarea {
            background: #334155;
            color: var(--text-light);
            border-color: #475569;
        }
        .app-container { max-width: 1400px; margin: 0 auto; padding: 16px; }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 24px; padding: 20px 24px; margin-bottom: 20px;
            color: white; display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 15px; position: relative; overflow: hidden;
        }
        .header::before { content: "🕉️"; position: absolute; font-size: 100px; opacity: 0.1; right: -10px; bottom: -20px; }
        .header-left { display: flex; align-items: center; gap: 15px; z-index: 1; }
        .temple-logo {
            width: 60px; height: 60px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; cursor: pointer; transition: all 0.3s ease; overflow: hidden;
        }
        .temple-logo:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .temple-logo img { width: 100%; height: 100%; object-fit: cover; }
        .header-text h1 { font-size: 1.4rem; font-weight: bold; }
        .header-text p { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
        .top-bar {
            background: var(--light-surface); border-radius: 16px; padding: 12px 20px;
            margin-bottom: 20px; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .user-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-super-admin { background: #dc2626; color: white; }
        .badge-admin { background: #f59e0b; color: white; }
        .badge-operator { background: #3b82f6; color: white; }
        .badge-viewer { background: #6b7280; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 18px; margin-bottom: 24px; }
        .card {
            background: var(--light-surface); border-radius: 20px; padding: 22px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .card-icon { font-size: 36px; color: var(--primary); margin-bottom: 12px; }
        .card-title { font-size: 14px; font-weight: 500; opacity: 0.7; margin-bottom: 5px; letter-spacing: 0.5px; }
        .card-value { font-size: 32px; font-weight: bold; }
        .nav-tabs {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
            background: var(--light-surface); padding: 10px; border-radius: 60px;
        }
        .nav-tab {
            padding: 12px 24px; border: none; background: transparent; border-radius: 40px;
            cursor: pointer; font-weight: 600; transition: all 0.3s ease;
            color: inherit; font-size: 14px;
        }
        .nav-tab.active { background: var(--primary); color: white; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input, select, textarea {
            width: 100%; padding: 12px 14px; border: 2px solid var(--border);
            border-radius: 12px; font-size: 14px; background: var(--light-surface);
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,153,51,0.1); }
        .btn {
            padding: 10px 22px; border: none; border-radius: 40px; cursor: pointer;
            font-weight: 600; transition: all 0.3s ease; display: inline-flex;
            align-items: center; gap: 8px; font-size: 14px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: scale(0.98); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-warning { background: var(--warning); color: white; }
        .table-container { overflow-x: auto; border-radius: 16px; max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--primary); color: white; font-weight: 600; position: sticky; top: 0; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .badge-paid { background: #d1fae5; color: #065f46; }
        body.dark .badge-paid { background: #064e3b; color: #a7f3d0; }
        .badge-pending { background: #fee2e2; color: #991b1b; }
        body.dark .badge-pending { background: #7f1d1d; color: #fecaca; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center;
            align-items: center; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--light-surface); border-radius: 24px;
            max-width: 90%; width: 550px; max-height: 85vh; overflow-y: auto;
            padding: 28px; animation: modalSlideIn 0.3s ease;
        }
        @keyframes modalSlideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--dark-surface); color: white; padding: 12px 24px;
            border-radius: 50px; z-index: 2100; animation: toastSlide 0.3s ease; font-size: 14px;
        }
        @keyframes toastSlide {
            from { bottom: -60px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
        .member-photo {
            width: 45px; height: 45px; border-radius: 50%; object-fit: cover;
            background: var(--primary); display: flex; align-items: center;
            justify-content: center; font-size: 18px; color: white;
        }
        .pending-row { background: rgba(239, 68, 68, 0.08); border-left: 3px solid var(--danger); }
        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .login-card {
            background: var(--light-surface); border-radius: 28px; padding: 50px 40px;
            max-width: 500px; margin: 60px auto; box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
        }
        .social-links {
            display: flex; justify-content: center; gap: 20px; margin: 25px 0; flex-wrap: wrap;
        }
        .social-icon {
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 24px; transition: all 0.3s ease; cursor: pointer;
        }
        .social-icon:hover { transform: scale(1.1); }
        .social-wa { background: #25D366; color: white; }
        .social-tg { background: #0088cc; color: white; }
        .social-fb { background: #1877f2; color: white; }
        .social-ig { background: #e4405f; color: white; }
        .social-yt { background: #ff0000; color: white; }
        .year-selector {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
            margin-bottom: 20px; padding: 15px; background: var(--light-surface);
            border-radius: 16px;
        }
        .about-section {
            line-height: 1.8; font-size: 16px;
        }
        @media (max-width: 768px) {
            .app-container { padding: 12px; }
            .header-text h1 { font-size: 1rem; }
            .nav-tab { padding: 8px 14px; font-size: 12px; }
            .card-value { font-size: 24px; }
            .login-card { margin: 30px 16px; padding: 30px 25px; }
        }
    </style>
</head>
<body>
    <div id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="login-card">
            <div style="font-size: 70px;">🕉️</div>
            <h2 style="color: var(--primary); margin-top: 15px; font-size: 1.8rem;">Bhavya Mandir</h2>
            <p style="opacity: 0.7; margin-bottom: 30px;">Nirman Samiti</p>
            
            <div class="form-group">
                <label>यूजरनेम / Username</label>
                <input type="text" id="loginUsername" placeholder="superadmin / admin / operator" style="font-size: 16px; padding: 14px;">
            </div>
            <div class="form-group">

            <button class="btn btn-primary" onclick="doLogin()" style="width: 100%; justify-content: center; padding: 14px; font-size: 16px;">🔐 लॉगिन करें</button>
            
            <div style="margin-top: 18px; text-align: center;">
                <a href="#" onclick="showForgotPassword()" style="color: var(--primary); font-size: 14px;">पासवर्ड भूल गए?</a>
            </div>
            
            <div style="margin-top: 25px; padding: 15px; background: rgba(255,153,51,0.1); border-radius: 12px;">
                <p style="font-size: 13px; font-weight: 600;">📢 डिफॉल्ट लॉगिन जानकारी</p>
                <p style="font-size: 12px; margin-top: 8px;">🔑 superadmin | admin | operator</p>
                <p style="font-size: 11px; margin-top: 5px;">📱 पासवर्ड रीसेट के लिए मोबाइल नंबर आवश्यक है</p>
            </div>

    </div>

    <div class="app-container" id="mainApp" style="display: none;">
        <div class="header">
            <div class="header-left">
                <div class="temple-logo" id="templeLogo" onclick="changeLogo()"><i class="fas fa-temple"></i></div>
                <div class="header-text">
                    <h1 id="committeeName">🚩 Bhavya Mandir Nirman Samiti</h1>

                <div class="dark-toggle" onclick="toggleDarkMode()" style="background: rgba(255,255,255,0.2); padding: 8px 14px; border-radius: 40px; cursor: pointer;">🌙</div>
            </div>
        </div>
        
        <div class="top-bar">

            <div><i class="fas fa-key" onclick="showChangePassword()" style="cursor: pointer; font-size: 16px;"></i> <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor: pointer; margin-left: 18px; font-size: 16px;"></i></div>
        </div>
        
        <div class="nav-tabs" id="navTabs">

            <button class="nav-tab" data-tab="settings">⚙️ सेटिंग्स</button>

        <div id="pageContent"></div>

    <div class="modal" id="modal"><div class="modal-content"><div id="modalBody"></div><div style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;"><button class="btn btn-outline" onclick="closeModal()">रद्द करें</button><button class="btn btn-primary" id="modalConfirmBtn">पुष्टि करें</button></div></div></div>

    <script>
        // ==================== LANGUAGE SETTINGS ====================
        let currentLang = "hi";
        const translations = {
            hi: {
                dashboard: "🏠 डैशबोर्ड", members: "👥 दानदाता", payments: "💰 भुगतान", pending: "⏰ बकाया",
                incomeExpense: "📈 आय-व्यय रिपोर्ट", committee: "🏛️ समिति सदस्य", expenses: "📉 खर्च प्रबंधन", 
                social: "🌐 सोशल मीडिया", about: "ℹ️ समिति के बारे में", users: "👑 यूजर प्रबंधन", settings: "⚙️ सेटिंग्स",
                totalDonors: "कुल दानदाता", totalIncome: "कुल आय", totalPending: "कुल बकाया", totalExpense: "कुल व्यय",
                netBalance: "नेट बैलेंस", pendingDonors: "बकाया दानदाता", addDonor: "दानदाता जोड़ें", addPayment: "भुगतान जोड़ें",
                name: "नाम", mobile: "मोबाइल", village: "गांव", monthlyAmount: "मासिक राशि", status: "स्थिति", actions: "कार्य",
                paid: "जमा", pending_status: "बकाया", collectPayment: "जमा करें", sendReminder: "रिमाइंडर भेजें", receipt: "रसीद",
                edit: "संपादित करें", delete: "हटाएं", view: "देखें", save: "सेव करें", cancel: "रद्द करें", confirm: "पुष्टि करें",
                login: "लॉगिन", username: "यूजरनेम", password: "पासवर्ड", forgotPassword: "पासवर्ड भूल गए?", changePassword: "पासवर्ड बदलें"
            },
            en: {
                dashboard: "🏠 Dashboard", members: "👥 Donors", payments: "💰 Payments", pending: "⏰ Pending",
                incomeExpense: "📈 Income-Expense Report", committee: "🏛️ Committee Members", expenses: "📉 Expense Management",
                social: "🌐 Social Media", about: "ℹ️ About Committee", users: "👑 User Management", settings: "⚙️ Settings",
                totalDonors: "Total Donors", totalIncome: "Total Income", totalPending: "Total Pending", totalExpense: "Total Expense",
                netBalance: "Net Balance", pendingDonors: "Pending Donors", addDonor: "Add Donor", addPayment: "Add Payment",
                name: "Name", mobile: "Mobile", village: "Village", monthlyAmount: "Monthly Amount", status: "Status", actions: "Actions",
                paid: "Paid", pending_status: "Pending", collectPayment: "Collect", sendReminder: "Send Reminder", receipt: "Receipt",
                edit: "Edit", delete: "Delete", view: "View", save: "Save", cancel: "Cancel", confirm: "Confirm",
                login: "Login", username: "Username", password: "Password", forgotPassword: "Forgot Password?", changePassword: "Change Password"
            }
        };
        function t(key) { return translations[currentLang][key] || translations.hi[key] || key; }

        // ==================== DATA STORAGE ====================
        let currentTab = "dashboard";
        let currentYear = new Date().getFullYear();
        
        let appData = {
            settings: {
                committeeName: "🚩 Bhavya Mandir Nirman Samiti",
                committeeBanner: "गुलाबपुरा, मोहनगढ़",
                upiId: "asryadavtkg@ybl",
                presidentName: "राजेंद्र यादव",
                secretaryName: "अरविंद सिंह यादव",
                defaultMonthlyAmount: 200,
                darkMode: false,
                logo: "",
                currentCommitteeYear: "2025-26",
                whatsappLink: "https://chat.whatsapp.com/",
                telegramLink: "https://t.me/",
                facebookLink: "https://facebook.com/",
                instagramLink: "https://instagram.com/",
                youtubeLink: "https://youtube.com/",
                googleSheetLink: "https://docs.google.com/spreadsheets/d/1WOep56-06ncO-yv9rAmDfVKnuw1cn-98sF4ltPGCLlE/view?usp=sharing",
                aboutText: "🚩 भव्य मंदिर निर्माण समिति का स्थापना 2020 में हुई थी। हमारा उद्देश्य भव्य मंदिर का निर्माण करना और समाज सेवा करना है। आप सभी का सहयोग हमारे लिए अमूल्य है।"
            },
            committeeMembers: [
                { id: 1, name: "राजेंद्र यादव", position: "अध्यक्ष", mobile: "9876543210", year: "2025-26", photo: "" },
                { id: 2, name: "अरविंद सिंह यादव", position: "सचिव", mobile: "9876543211", year: "2025-26", photo: "" },
                { id: 3, name: "राम प्रसाद", position: "कोषाध्यक्ष", mobile: "9876543212", year: "2025-26", photo: "" }
            ],
            members: [],
            payments: [],
            expenses: [],
            users: [
                { id: 1, username: "superadmin", password: btoa("Bhavya@2026"), mobile: "9876543210", role: "super_admin", name: "राजेंद्र यादव" },
                { id: 2, username: "admin", password: btoa("Mandir@2026"), mobile: "9876543211", role: "admin", name: "अरविंद सिंह यादव" },
                { id: 3, username: "operator", password: btoa("Seva@2026"), mobile: "9876543212", role: "operator", name: "ऑपरेटर" },
                { id: 4, username: "viewer", password: btoa("View@2026"), mobile: "9876543213", role: "viewer", name: "दर्शक" }
            ],
            currentUser: null
        };

        const monthNames = ["जनवरी", "फरवरी", "मार्च", "अप्रैल", "मई", "जून", "जुलाई", "अगस्त", "सितंबर", "अक्टूबर", "नवंबर", "दिसंबर"];
        const years = [2023, 2024, 2025, 2026, 2027, 2028, 2029, 2030, 2031, 2032];

        // ==================== INITIALIZATION ====================
        function init() {
            loadData();
            applyTheme();
        }

        function loadData() {
            const saved = localStorage.getItem("templeAppData");
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    appData = { ...appData, ...parsed };
                } catch(e) { console.log("Error loading data"); }
            }
            
            if (appData.members.length === 0) {
                appData.members = [
                    { id: 1, name: "राम प्रसाद", fatherName: "सीता राम", mobile: "9876543210", village: "अयोध्या", address: "मंदिर के पास", monthlyAmount: 200, joinDate: "2024-01-01", photo: "" },
                    { id: 2, name: "हरि शंकर", fatherName: "राम शंकर", mobile: "9876543211", village: "वृंदावन", address: "मेन बाजार", monthlyAmount: 150, joinDate: "2024-01-15", photo: "" },
                    { id: 3, name: "सीता देवी", fatherName: "राम प्रसाद", mobile: "9876543212", village: "अयोध्या", address: "हनुमान गली", monthlyAmount: 300, joinDate: "2024-02-01", photo: "" }
                ];
            }
            
            if (appData.payments.length === 0) {
                const currentDate = new Date();
                appData.members.forEach(member => {
                    for (let m = 0; m <= currentDate.getMonth(); m++) {
                        appData.payments.push({
                            id: Date.now() + m + member.id,
                            memberId: member.id,
                            memberName: member.name,
                            month: monthNames[m],
                            monthIndex: m,
                            year: currentDate.getFullYear(),
                            amountPaid: m === 0 ? member.monthlyAmount : 0,
                            pendingAmount: m === 0 ? 0 : member.monthlyAmount,
                            status: m === 0 ? "Paid" : "Pending",
                            receiptNo: m === 0 ? `BHAVYA-${currentDate.getFullYear()}-${member.id}` : "",
                            paymentDate: m === 0 ? new Date().toISOString().split('T')[0] : "",
                            paymentMode: m === 0 ? "UPI" : "",
                            addedBy: "system",
                            addedByName: "सिस्टम"
                        });
                    }
                });
            }
            
            if (appData.expenses.length === 0) {

        // ==================== PAYMENT FUNCTIONS ====================
        function addPayment(memberId, monthIndex, year, amount, mode, addedByUser) {
            const member = appData.members.find(m => m.id === memberId);
            const month = monthNames[monthIndex];
            const receiptNo = `BHAVYA-${year}-${memberId}-${Date.now()}`;
            const paymentDate = new Date().toISOString().split('T')[0];
            
            let payment = appData.payments.find(p => p.memberId === memberId && p.year === year && p.monthIndex === monthIndex);
            if(payment) {
                payment.amountPaid += amount;
                payment.pendingAmount = Math.max(0, member.monthlyAmount - payment.amountPaid);
                payment.status = payment.pendingAmount <= 0 ? "Paid" : "Pending";
                payment.receiptNo = receiptNo;
                payment.paymentDate = paymentDate;
                payment.paymentMode = mode;
                payment.addedBy = addedByUser.username;
                payment.addedByName = addedByUser.name;
            } else {
                payment = {
                    id: Date.now(),
                    memberId, memberName: member.name, month, monthIndex, year,
                    amountPaid: amount,
                    pendingAmount: Math.max(0, member.monthlyAmount - amount),
                    status: amount >= member.monthlyAmount ? "Paid" : "Pending",
                    receiptNo: receiptNo,
                    paymentDate: paymentDate,
                    paymentMode: mode,
                    addedBy: addedByUser.username,
                    addedByName: addedByUser.name
                };
                appData.payments.push(payment);
            }
            saveData();
            return payment;
        }

                };

        function renderPaymentsTable() {
            const yearFilter = parseInt(document.getElementById("filterYear")?.value) || currentYear;

            let filtered = appData.payments.filter(p => p.year === yearFilter);

            return filtered.map(p => {
                const member = appData.members.find(m => m.id === p.memberId);
                return `<tr class="${p.status === 'Pending' ? 'pending-row' : ''}">

        function collectPayment(paymentId) {
            const payment = appData.payments.find(p => p.id === paymentId);
            if(!payment) return;
            const member = appData.members.find(m => m.id === payment.memberId);
            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `<h3>💰 ${t("collectPayment")}</h3>
                <p><strong>दानदाता:</strong> ${member?.name}</p>

            document.getElementById("modalConfirmBtn").onclick = () => {

                const mode = document.getElementById("mode").value;
                payment.amountPaid += amount;
                payment.pendingAmount = Math.max(0, payment.pendingAmount - amount);

                payment.receiptNo = `BHAVYA-${payment.year}-${payment.memberId}-${Date.now()}`;
                payment.paymentDate = new Date().toISOString().split('T')[0];
                payment.paymentMode = mode;
                payment.addedBy = appData.currentUser.username;
                payment.addedByName = appData.currentUser.name;
                saveData();
                closeModal();
                renderPayments();
                sendPaymentReceipt(member, payment, amount);

        // ==================== INCOME EXPENSE REPORT ====================
        function renderIncomeExpense() {
            const yearData = appData.payments.filter(p => p.year === currentYear);
            const yearExpenses = appData.expenses.filter(e => e.year === currentYear);
            
            const monthlyReport = [];
            let totalYearIncome = 0, totalYearExpense = 0;
            
            monthNames.forEach((month, idx) => {
                const monthIncome = yearData.filter(p => p.monthIndex === idx).reduce((s,p) => s + p.amountPaid, 0);
                const monthExpense = yearExpenses.filter(e => e.month === month).reduce((s,e) => s + e.amount, 0);
                totalYearIncome += monthIncome;
                totalYearExpense += monthExpense;
                monthlyReport.push({ month, income: monthIncome, expense: monthExpense, profit: monthIncome - monthExpense });
            });
            
            const html = `
                <div class="year-selector">
                    <label style="font-weight: 600;">वर्ष चुनें:</label>
                    <select id="reportYear" onchange="changeReportYear()" style="width: auto; padding: 10px;">${years.map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`).join('')}</select>
                    <button class="btn btn-success" onclick="sendReportToPresident()"><i class="fab fa-whatsapp"></i> अध्यक्ष को रिपोर्ट भेजें</button>
                </div>
                <div class="stats-grid">
                    <div class="card"><div class="card-title">वर्ष ${currentYear} कुल आय</div><div class="card-value" style="color: var(--success);">₹${totalYearIncome.toLocaleString()}</div></div>
                    <div class="card"><div class="card-title">वर्ष ${currentYear} कुल व्यय</div><div class="card-value" style="color: var(--danger);">₹${totalYearExpense.toLocaleString()}</div></div>
                    <div class="card"><div class="card-title">वर्ष ${currentYear} शेष</div><div class="card-value">₹${(totalYearIncome - totalYearExpense).toLocaleString()}</div></div>
                </div>
                <div class="card">
                    <h4>📈 ${currentYear} मासिक आय-व्यय रिपोर्ट</h4>
                    <div class="table-container">
                        <table style="font-size: 13px;">
                            <thead><tr><th>महीना</th><th>आय (₹)</th><th>व्यय (₹)</th><th>शेष (₹)</th><th>स्थिति</th></tr></thead>
                            <tbody>${monthlyReport.map(r => `
                                <tr class="${r.profit < 0 ? 'pending-row' : ''}">
                                    <td><strong>${r.month}</strong></td>
                                    <td style="color: var(--success);">₹${r.income.toLocaleString()}</td>
                                    <td style="color: var(--danger);">₹${r.expense.toLocaleString()}</td>
                                    <td>₹${r.profit.toLocaleString()}</td>
                                    <td><span class="badge ${r.profit >= 0 ? 'badge-paid' : 'badge-pending'}">${r.profit >= 0 ? 'लाभ' : 'घाटा'}</span></td>
                                </tr>
                            `).join('')}</tbody>
                        </table>
                    </div>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <h4>📊 ${currentYear} आय-व्यय चार्ट</h4>
                    <canvas id="incomeExpenseChart" style="max-height: 300px;"></canvas>
                </div>
            `;
            document.getElementById("pageContent").innerHTML = html;
            
            const ctx = document.getElementById('incomeExpenseChart')?.getContext('2d');
            if(ctx) {
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: monthlyReport.map(r => r.month),
                        datasets: [
                            { label: 'आय (₹)', data: monthlyReport.map(r => r.income), borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.3 },
                            { label: 'व्यय (₹)', data: monthlyReport.map(r => r.expense), borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.3 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }
        }

        function sendReportToPresident() {
            const president = appData.committeeMembers.find(m => m.position === "अध्यक्ष");
            if(president && president.mobile) {
                const totalIncome = appData.payments.filter(p => p.status === "Paid").reduce((s, p) => s + p.amountPaid, 0);
                const totalExpense = appData.expenses.reduce((s, e) => s + e.amount, 0);
                const totalPending = appData.payments.filter(p => p.status === "Pending").reduce((s, p) => s + p.pendingAmount, 0);
                const message = `🚩 *भव्य मंदिर निर्माण समिति* 🚩\n\n📊 *मासिक रिपोर्ट - ${monthNames[new Date().getMonth()]} ${new Date().getFullYear()}*\n\n💰 *कुल आय:* ₹${totalIncome}\n📉 *कुल व्यय:* ₹${totalExpense}\n✅ *शेष बचत:* ₹${totalIncome - totalExpense}\n⚠️ *कुल बकाया:* ₹${totalPending}\n\n🙏 *जय श्री राम* 🙏`;
                window.open(`https://wa.me/91${president.mobile}?text=${encodeURIComponent(message)}`, '_blank');
            } else {
                alert("❌ अध्यक्ष का मोबाइल नंबर नहीं मिला! कृपया समिति सदस्य में अध्यक्ष जोड़ें।");
            }
        }

                    <button class="btn btn-info" onclick="joinTelegramChannel()" style="background: #0088cc; color: white; margin-left: 10px;"><i class="fab fa-telegram"></i> Telegram जॉइन करें</button>
                </div>
            `;
            document.getElementById("pageContent").innerHTML = html;
        }

        function openLink(url) { if(url && url !== "#" && url !== "") window.open(url, '_blank'); else alert("⚠️ लिंक सेट नहीं है! कृपया एडमिन से संपर्क करें।"); }
        function joinWhatsAppGroup() { openLink(appData.settings.whatsappLink); }
        function joinTelegramChannel() { openLink(appData.settings.telegramLink); }
        
        function saveSocialLinks() {
            appData.settings.whatsappLink = document.getElementById("waLink").value;
            appData.settings.telegramLink = document.getElementById("tgLink").value;
            appData.settings.facebookLink = document.getElementById("fbLink").value;
            appData.settings.instagramLink = document.getElementById("igLink").value;
            appData.settings.youtubeLink = document.getElementById("ytLink").value;
            saveData();
            showToast("✅ सोशल मीडिया लिंक सेव हो गए!");
        }

        // ==================== ABOUT COMMITTEE ====================
        function renderAbout() {
            const html = `
                <div class="card">
                    <h3>ℹ️ समिति के बारे में</h3>
                    <div class="about-section">
                        <p>${appData.settings.aboutText}</p>
                        <hr style="margin: 20px 0;">
                        <h4>📞 संपर्क सूत्र</h4>
                        <p><strong>🏛️ अध्यक्ष:</strong> ${appData.settings.presidentName}</p>
                        <p><strong>📝 सचिव:</strong> ${appData.settings.secretaryName}</p>
                        <p><strong>💸 UPI ID:</strong> ${appData.settings.upiId}</p>
                        <p><strong>📧 Email:</strong> bhavyamandir@gmail.com</p>
                        <hr style="margin: 20px 0;">
                        <h4>📊 Google Sheet लिंक</h4>
                        <p><a href="${appData.settings.googleSheetLink}" target="_blank" style="color: var(--primary);">${appData.settings.googleSheetLink}</a></p>
                        ${hasPermission("manage_settings") ? `
                            <hr style="margin: 20px 0;">
                            <h4>✏️ समिति की जानकारी एडिट करें</h4>
                            <div class="form-group"><label>समिति के बारे में</label><textarea id="aboutText" rows="5" style="font-size: 15px;">${appData.settings.aboutText}</textarea></div>
                            <div class="form-group"><label>Google Sheet Link</label><input type="text" id="sheetLink" value="${appData.settings.googleSheetLink}" style="font-size: 15px;"></div>
                            <button class="btn btn-primary" onclick="saveAboutText()"><i class="fas fa-save"></i> जानकारी सेव करें</button>
                        ` : ''}
                    </div>
                </div>
            `;
            document.getElementById("pageContent").innerHTML = html;
        }

        function saveAboutText() {
            appData.settings.aboutText = document.getElementById("aboutText").value;
            appData.settings.googleSheetLink = document.getElementById("sheetLink").value;
            saveData();
            showToast("✅ जानकारी सेव हो गई!");
        }

        // ==================== USERS MANAGEMENT ====================
        function renderUsers() {
            if (!hasPermission("manage_users")) {
                document.getElementById("pageContent").innerHTML = "<div class='card'><h3>🔒 Access Denied</h3><p>केवल एडमिन ही यूजर प्रबंधन कर सकते हैं।</p></div>";
                return;
            }
            const html = `
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="showAddUserModal()"><i class="fas fa-user-plus"></i> नया यूजर जोड़ें</button>
                </div>
                <div class="card">
                    <div class="table-container">
                        <table style="font-size: 13px;">
                            <thead><tr><th>यूजरनेम</th><th>नाम</th><th>मोबाइल</th><th>रोल</th><th>अधिकार</th><th>कार्य</th></tr></thead>
                            <tbody>${appData.users.map(u => `
                                <tr>
                                    <td>${u.username}</td>
                                    <td>${u.name}</td>
                                    <td>${u.mobile}</td>
                                    <td><span class="badge ${u.role === 'super_admin' ? 'badge-paid' : (u.role === 'admin' ? 'badge-pending' : 'badge-pending')}">
                                        ${u.role === 'super_admin' ? '🇮🇳 सुपर एडमिन / अध्यक्ष' : (u.role === 'admin' ? '👑 एडमिन / सचिव' : (u.role === 'operator' ? '🔧 ऑपरेटर' : '👁️ दर्शक'))}
                                    </span></td>
                                    <td>${u.role === 'operator' ? 'दानदाता जोड़ें, भुगतान करें, मैसेज भेजें' : (u.role === 'admin' ? 'पूरा कंट्रोल (सेटिंग्स, यूजर, सब कुछ)' : (u.role === 'super_admin' ? 'पूरा कंट्रोल' : 'केवल देख सकते हैं'))}</td>
                                    <td class="action-btns">
                                        <button class="btn btn-warning" onclick="resetUserPassword(${u.id})" style="padding: 6px 12px;">पासवर्ड रीसेट</button>
                                        ${u.username !== 'superadmin' ? `<button class="btn btn-danger" onclick="deleteUser(${u.id})" style="padding: 6px 12px;">हटाएं</button>` : ''}
                                        ${u.role === 'operator' && appData.currentUser?.role === 'super_admin' ? `<button class="btn btn-primary" onclick="makeAdmin(${u.id})" style="padding: 6px 12px;">एडमिन बनाएं</button>` : ''}
                                        ${u.role === 'admin' && appData.currentUser?.role === 'super_admin' ? `<button class="btn btn-warning" onclick="makeOperator(${u.id})" style="padding: 6px 12px;">ऑपरेटर बनाएं</button>` : ''}
                                    </td>
                                </tr>
                            `).join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;
            document.getElementById("pageContent").innerHTML = html;
        }

        function showAddUserModal() {
            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `<h3>➕ नया यूजर जोड़ें</h3>
                <div class="form-group"><label>यूजरनेम</label><input type="text" id="username" style="font-size: 15px;"></div>
                <div class="form-group"><label>नाम</label><input type="text" id="name" style="font-size: 15px;"></div>
                <div class="form-group"><label>मोबाइल नंबर *</label><input type="tel" id="mobile" placeholder="10 अंकों का मोबाइल नंबर" style="font-size: 15px;"></div>
                <div class="form-group"><label>पासवर्ड</label><input type="password" id="password" style="font-size: 15px;"></div>
                <div class="form-group"><label>रोल</label><select id="role" style="font-size: 15px;">
                    <option value="viewer">👁️ दर्शक (केवल देखें)</option>
                    <option value="operator">🔧 ऑपरेटर (दानदाता + भुगतान + मैसेज)</option>
                    <option value="admin">👑 एडमिन (पूरा कंट्रोल)</option>
                </select></div>
                <p style="font-size: 12px; color: #666; margin-top: 10px;">⚠️ मोबाइल नंबर पासवर्ड रीसेट के लिए आवश्यक है</p>`;
            
            document.getElementById("modalConfirmBtn").onclick = () => {
                if(!document.getElementById("username").value || !document.getElementById("password").value || !document.getElementById("mobile").value) {
                    alert("❌ यूजरनेम, पासवर्ड और मोबाइल नंबर सभी जरूरी हैं!");
                    return;
                }
                if(document.getElementById("mobile").value.length !== 10) {
                    alert("❌ मोबाइल नंबर 10 अंकों का होना चाहिए!");
                    return;
                }
                appData.users.push({
                    id: Date.now(),
                    username: document.getElementById("username").value,
                    name: document.getElementById("name").value,
                    mobile: document.getElementById("mobile").value,
                    password: btoa(document.getElementById("password").value),
                    role: document.getElementById("role").value
                });
                saveData();
                closeModal();
                renderUsers();
                showToast("✅ नया यूजर सफलतापूर्वक जुड़ गया!");
            };
            document.getElementById("modal").style.display = "flex";
        }

        function deleteUser(userId) {
            if(confirm("⚠️ क्या आप सच में इस यूजर को हटाना चाहते हैं?")) {
                appData.users = appData.users.filter(u => u.id !== userId);
                saveData();
                renderUsers();
                showToast("✅ यूजर हटा दिया गया!");
            }
        }

        function makeAdmin(userId) {
            if(confirm("इस ऑपरेटर को एडमिन बनाएं?")) {
                const user = appData.users.find(u => u.id === userId);
                if(user && user.role === "operator") {
                    user.role = "admin";
                    saveData();
                    renderUsers();
                    showToast("✅ अब यह यूजर एडमिन है!");
                }
            }
        }

        function makeOperator(userId) {
            if(confirm("इस एडमिन को ऑपरेटर बनाएं?")) {
                const user = appData.users.find(u => u.id === userId);
                if(user && user.role === "admin" && user.username !== "admin") {
                    user.role = "operator";
                    saveData();
                    renderUsers();
                    showToast("✅ अब यह यूजर ऑपरेटर है!");
                } else {
                    alert("❌ डिफॉल्ट एडमिन को नहीं बदला जा सकता!");
                }
            }
        }

        // ==================== SETTINGS ====================
        function renderSettings() {
            if (!hasPermission("manage_settings")) {
                document.getElementById("pageContent").innerHTML = "<div class='card'><h3>🔒 Access Denied</h3><p>केवल एडमिन ही सेटिंग्स बदल सकते हैं।</p></div>";
                return;
            }
            const html = `
                <div class="card">
                    <h3>⚙️ समिति सेटिंग्स</h3>
                    <div class="form-group"><label>समिति का नाम</label><input type="text" id="committeeName" value="${appData.settings.committeeName}" style="font-size: 15px;"></div>
                    <div class="form-group"><label>समिति का बैनर/टैगलाइन</label><input type="text" id="committeeBanner" value="${appData.settings.committeeBanner}" style="font-size: 15px;"></div>
                    <div class="form-group"><label>UPI ID</label><input type="text" id="upiId" value="${appData.settings.upiId}" style="font-size: 15px;"></div>
                    <div class="form-group"><label>अध्यक्ष का नाम</label><input type="text" id="presidentName" value="${appData.settings.presidentName}" style="font-size: 15px;"></div>
                    <div class="form-group"><label>सचिव का नाम</label><input type="text" id="secretaryName" value="${appData.settings.secretaryName}" style="font-size: 15px;"></div>
                    <div class="form-group"><label>डिफॉल्ट मासिक राशि (नए दानदाता के लिए)</label><input type="number" id="defaultMonthlyAmount" value="${appData.settings.defaultMonthlyAmount}" style="font-size: 15px;"></div>
                    <button class="btn btn-primary" onclick="saveSettings()"><i class="fas fa-save"></i> सेटिंग्स सेव करें</button>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <h3>🖼️ समिति का लोगो बदलें</h3>
                    <input type="file" id="logoInput" accept="image/*">
                    <div id="logoPreview" style="margin-top: 10px;">${appData.settings.logo ? `<img src="${appData.settings.logo}" style="width: 80px; height: 80px; border-radius: 50%;">` : ''}</div>
                    <button class="btn btn-primary" onclick="changeLogo()" style="margin-top: 10px;">लोगो अपलोड करें</button>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <h3>🔄 डेटा प्रबंधन</h3>
                    <button class="btn btn-success" onclick="downloadBackup()"><i class="fas fa-download"></i> बैकअप डाउनलोड करें</button>
                    <button class="btn btn-danger" onclick="resetAllData()" style="margin-left: 10px;"><i class="fas fa-trash"></i> सभी डेटा रीसेट करें</button>
                </div>
            `;
            document.getElementById("pageContent").innerHTML = html;
            if(appData.settings.logo) document.getElementById("logoPreview").innerHTML = `<img src="${appData.settings.logo}" style="width: 80px; height: 80px; border-radius: 50%; margin-top: 10px;">`;
        }

        function saveSettings() {
            appData.settings.committeeName = document.getElementById("committeeName").value;
            appData.settings.committeeBanner = document.getElementById("committeeBanner").value;
            appData.settings.upiId = document.getElementById("upiId").value;
            appData.settings.presidentName = document.getElementById("presidentName").value;
            appData.settings.secretaryName = document.getElementById("secretaryName").value;
            appData.settings.defaultMonthlyAmount = parseInt(document.getElementById("defaultMonthlyAmount").value);
            document.getElementById("committeeName").innerText = appData.settings.committeeName;
            document.getElementById("committeeBanner").innerText = appData.settings.committeeBanner;
            saveData();
            showToast("✅ सेटिंग्स सफलतापूर्वक सेव हो गई!");
        }

        function changeLogo() {
            const input = document.getElementById("logoInput");
            if(input && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    appData.settings.logo = ev.target.result;
                    saveData();
                    document.getElementById("templeLogo").innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                    showToast("✅ लोगो सफलतापूर्वक बदल गया!");
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                alert("❌ कृपया पहले फोटो select करें!");
            }
        }

        function downloadBackup() {
            const backup = {
                members: appData.members,
                payments: appData.payments,
                expenses: appData.expenses,
                settings: appData.settings,
                committeeMembers: appData.committeeMembers,
                users: appData.users.map(u => ({ ...u, password: undefined })),
                backupDate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `temple_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast("✅ बैकअप डाउनलोड हो गया!");
        }

        function resetAllData() {
            if(confirm("⚠️ चेतावनी: इससे सारा डेटा डिलीट हो जाएगा! क्या आप सच में रीसेट करना चाहते हैं?")) {
                localStorage.removeItem("templeAppData");
                location.reload();
            }
        }

        // ==================== HELPER FUNCTIONS ====================
        function setupEventListeners() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTab = tab.dataset.tab;
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderCurrentPage();
                });
            });
        }

        function switchTab(tabName) { 
            currentTab = tabName; 
            renderCurrentPage(); 
        }

        function renderCurrentPage() {
            switch(currentTab) {
                case "dashboard": renderDashboard(); break;
                case "members": renderMembers(); break;
                case "payments": renderPayments(); break;
                case "pending": renderPending(); break;
                case "incomeExpense": renderIncomeExpense(); break;
                case "committee": renderCommittee(); break;
                case "expenses": renderExpenses(); break;
                case "social": renderSocial(); break;
                case "about": renderAbout(); break;
                case "users": renderUsers(); break;
                case "settings": renderSettings(); break;
                default: renderDashboard();
            }
        }

        function toggleLanguage() { 
            currentLang = currentLang === "hi" ? "en" : "hi";
            document.querySelector(".lang-btn").innerHTML = currentLang === "hi" ? "🌐 हिंदी" : "🌐 English";
            renderCurrentPage();
            updateNavTexts();
        }

        function updateNavTexts() {
            const tabs = ["dashboard", "members", "payments", "pending", "incomeExpense", "committee", "expenses", "social", "about", "users", "settings"];
            document.querySelectorAll(".nav-tab").forEach((tab, i) => {
                if(tabs[i]) tab.innerHTML = tab.innerHTML.replace(/[^<]*/, t(tabs[i]));
            });
        }

        function toggleDarkMode() { 
            document.body.classList.toggle('dark'); 
            appData.settings.darkMode = document.body.classList.contains('dark'); 
            saveData(); 
        }

        function applyTheme() { 
            if(appData.settings.darkMode) document.body.classList.add('dark'); 
            if(appData.settings.logo) document.getElementById("templeLogo").innerHTML = `<img src="${appData.settings.logo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`; 
        }

        function closeModal() { 
            document.getElementById("modal").style.display = "none"; 
            window.tempPhoto = null; 
        }

        function showToast(message) { 
            let toast = document.querySelector('.toast'); 
            if(toast) toast.remove(); 
            toast = document.createElement('div'); 
            toast.className = 'toast'; 
            toast.innerHTML = message; 
            document.body.appendChild(toast); 
            setTimeout(() => toast.remove(), 3000); 
        }

        // Start the app
        init();
    </script>
</body>
</html>
