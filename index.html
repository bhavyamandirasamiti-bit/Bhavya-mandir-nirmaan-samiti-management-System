<html lang="hi">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; }
        :root {
            --saffron: #FF9933; --saffron-dark: #e68200; --gold: #D4AF37; --white: #fff;
            --dark-bg: #1e1e2f; --dark-card: #2a2a3a; --danger: #dc3545; --success: #28a745;
            --gray: #6c757d; --blue: #007bff; --cyan: #17a2b8; --purple: #6f42c1; --pink: #e83e8c;
            --orange: #fd7e14; --teal: #20c997; --indigo: #6610f2;
        }
        body { background: #fef7e6; transition: 0.3s; }
        body.dark { background: var(--dark-bg); color: #e0e0e0; }
        
        /* Login */
        .login-container {

        }
        .login-card {
            background: rgba(255,255,255,0.95); border-radius: 48px; padding: 32px;
            width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-card .logo { font-size: 60px; margin-bottom: 10px; }
        .login-card h2 { color: var(--saffron); margin-bottom: 10px; }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 60px; }
        .btn { padding: 10px 18px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--saffron); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-info { background: var(--cyan); color: white; }
        
        /* App */
        .app-container { display: none; }
        .header {
            background: linear-gradient(90deg, var(--saffron), var(--gold));
            color: white; padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; position: sticky; top: 0; z-index: 100;
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 30px; cursor: pointer; font-size: 12px; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .lang-btn { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 30px; cursor: pointer; font-size: 12px; }
        
        /* Main Tabs */
        .main-tabs {
            background: white; display: flex; overflow-x: auto; padding: 10px 16px;
            gap: 8px; border-bottom: 2px solid var(--saffron);
        }
        body.dark .main-tabs { background: var(--dark-card); }
        .main-tab {
            border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600;
            cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .main-tab[data-tab="home"] { background: #E3F2FD; color: #1976D2; }
        .main-tab[data-tab="home"].active { background: #1976D2; color: white; }
        .main-tab[data-tab="members"] { background: #E8F5E9; color: #388E3C; }
        .main-tab[data-tab="members"].active { background: #388E3C; color: white; }
        .main-tab[data-tab="finance"] { background: #FFF3E0; color: #F57C00; }
        .main-tab[data-tab="finance"].active { background: #F57C00; color: white; }
        .main-tab[data-tab="temple"] { background: #FCE4EC; color: #C2185B; }
        .main-tab[data-tab="temple"].active { background: #C2185B; color: white; }
        .main-tab[data-tab="reports"] { background: #E8EAF6; color: #3949AB; }
        .main-tab[data-tab="reports"].active { background: #3949AB; color: white; }
        .main-tab[data-tab="settings"] { background: #EFEBE9; color: #5D4037; }
        .main-tab[data-tab="settings"].active { background: #5D4037; color: white; }
        body.dark .main-tab { background: #3a3a4a; color: #ddd; }
        
        /* Sub Tabs */
        .sub-tabs {
            background: #f8f9fa; display: flex; overflow-x: auto; padding: 8px 16px;
            gap: 8px; border-bottom: 1px solid #eee;
        }
        body.dark .sub-tabs { background: #252535; }
        .sub-tab {
            padding: 6px 18px; border-radius: 40px; font-size: 13px; cursor: pointer;
            white-space: nowrap; transition: 0.2s; background: #e9ecef; color: #495057;
        }
        body.dark .sub-tab { background: #3a3a4a; color: #ccc; }
        .sub-tab.active { background: var(--saffron); color: white; }
        
        /* Content */
        .content-area { padding: 20px; padding-bottom: 80px; min-height: calc(100vh - 180px); }
        
        /* Cards - Colorful Data */
        .card {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--saffron);
        }
        body.dark .card { background: var(--dark-card); }
        .card-title {
            font-size: 18px; font-weight: 700; margin-bottom: 16px;
            background: linear-gradient(90deg, var(--saffron), var(--gold));
            -webkit-background-clip: text;
            background-clip: text; color: transparent; display: inline-block;
        }
        body.dark .card-title { background: linear-gradient(90deg, #FF9933, #FFB366); -webkit-background-clip: text; background-clip: text; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: white; border-radius: 20px; padding: 16px; text-align: center;
            border-bottom: 3px solid var(--saffron); transition: 0.2s;
        }
        body.dark .stat-card { background: #2f2f3f; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--saffron); }
        .stat-label { font-size: 12px; color: var(--gray); margin-top: 5px; }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .member-card, .donation-row, .path-item, .event-item {
            background: linear-gradient(135deg, #fff7f0, #fff);
            border-radius: 16px; padding: 14px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            gap: 10px; border: 1px solid #ffe0b3; transition: 0.2s;
        }
        body.dark .member-card, body.dark .donation-row, body.dark .path-item, body.dark .event-item {
            background: #353546; border-color: #FF9933;
        }
        .member-card:hover { transform: translateX(5px); border-left: 4px solid var(--saffron); }
        
        .badge-pending { background: linear-gradient(135deg, #f8d7da, #f5c6cb); color: #a71d2a; border-radius: 30px; padding: 4px 12px; font-size: 12px; font-weight: 600; }
        .badge-paid { background: linear-gradient(135deg, #d4edda, #c3e6cb); color: #155724; border-radius: 30px; padding: 4px 12px; font-weight: 600; }
        .badge-partial { background: linear-gradient(135deg, #fff3cd, #ffe69e); color: #856404; border-radius: 30px; padding: 4px 12px; }
        .badge-upcoming { background: linear-gradient(135deg, #cce5ff, #b8daff); color: #004085; border-radius: 30px; padding: 4px 12px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { font-weight: 600; display: block; margin-bottom: 6px; color: var(--saffron-dark); }
        .form-control, input, select, textarea {
            width: 100%; padding: 12px; border-radius: 40px; border: 1px solid #ddd;
            background: #f9f9f9; transition: 0.2s;
        }
        .form-control:focus { border-color: var(--saffron); outline: none; box-shadow: 0 0 0 3px rgba(255,153,51,0.2); }
        select { cursor: pointer; background: #f9f9f9; }
        
        .modal {
            position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; border-radius: 28px; padding: 24px; width: 90%;
            max-width: 500px; max-height: 85vh; overflow-y: auto;
        }
        body.dark .modal-content { background: #2a2a3a; color: #eee; }
        
        .toast {
            position: fixed; bottom: 80px; left: 20px; right: 20px; background: #333;
            color: white; padding: 12px; border-radius: 50px; text-align: center;
            z-index: 1100; animation: fadeUp 0.3s;
        }
        @keyframes fadeUp { from { opacity:0; transform: translateY(20px);} to { opacity:1; transform:translateY(0);} }
        
        .progress-bar { height: 10px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--saffron), var(--gold)); border-radius: 10px; }
        
        .photo-preview { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 10px; border: 2px solid var(--saffron); }
        .committee-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: white; }
        
        canvas { max-height: 200px; width: 100% !important; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .gallery-item { aspect-ratio: 1; background: #f0f0f0; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .role-super_admin { background: linear-gradient(135deg, #ffd700, #ffc107); color: #000; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        .role-admin { background: linear-gradient(135deg, #17a2b8, #138496); color: white; padding: 2px 8px; border-radius: 20px; }
        .role-operator { background: linear-gradient(135deg, #28a745, #218838); color: white; padding: 2px 8px; border-radius: 20px; }
        .role-viewer { background: linear-gradient(135deg, #6c757d, #5a6268); color: white; padding: 2px 8px; border-radius: 20px; }
        
        /* Colored Table */
        .data-table { width: 100%; border-collapse: collapse; border-radius: 16px; overflow: hidden; }
        .data-table th {
            background: linear-gradient(135deg, var(--saffron), var(--gold));
            color: white; padding: 12px; text-align: left; font-weight: 600;
        }
        .data-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .data-table tr:hover { background: #fff0e0; }
        body.dark .data-table td { border-color: #444; }
        body.dark .data-table tr:hover { background: #3a3a4a; }
        
        /* Colored Dropdown */
        .color-dropdown { background: linear-gradient(135deg, #f8f9fa, #e9ecef); border-color: var(--saffron); font-weight: 500; }
        
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .main-tab, .sub-tab { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>

    function computePendingDues() {
        const now = new Date();
        const curYear = now.getFullYear();
        const curMonthIdx = now.getMonth();
        appData.members.forEach(m => {
            if(m.status !== 'active') return;
            const join = new Date(m.joinDate);
            let totalExpected = 0;
            for(let y = join.getFullYear(); y <= curYear; y++) {
                let startM = (y === join.getFullYear()) ? join.getMonth() : 0;
                let endM = (y === curYear) ? curMonthIdx : 11;
                for(let mo = startM; mo <= endM; mo++) totalExpected += m.monthlyAmount;
            }
            const paid = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly').reduce((s,d)=>s+d.amount,0);
            m.pending = totalExpected - paid;
            if(m.pending < 0) m.pending = 0;
        });
        saveToLocal();
    }

    function addAuditLog(action, details, itemId=null, oldVal=null, newVal=null) {
        appData.auditLogs.unshift({ action, details, user: currentUser?.name, role: currentUser?.role, timestamp: new Date().toISOString(), itemId });
        if(appData.auditLogs.length > 500) appData.auditLogs.pop();
        saveToLocal();
    }

    function addEditHistory(item, type, oldValue, newValue, reason) {
        if(!item.editHistory) item.editHistory = [];
        item.editHistory.unshift({ timestamp: new Date().toISOString(), user: currentUser?.name, role: currentUser?.role, oldValue: JSON.stringify(oldValue), newValue: JSON.stringify(newValue), reason });
        item.updated_by = currentUser?.name;
        item.updated_at = new Date().toISOString();
        addAuditLog(`EDIT_${type}`, `${type} edited`, item.id, oldValue, newValue);
    }

    function can(perm) {
        if(!currentUser) return false;
        if(currentUser.role === 'super_admin') return true;
        if(currentUser.role === 'admin') return ['add_member','edit_member','delete_member','add_donation','edit_donation','manage_expense','view_reports','send_reminder','manage_events'].includes(perm);
        if(currentUser.role === 'operator') return ['add_donation','view_members','send_reminder'];
        if(currentUser.role === 'viewer') return ['view_reports','view_members'];
        return false;
    }

        let subHtml = '';
        if(subTabsConfig[currentMain]) {

                subHtml += `<button class="sub-tab ${currentSub === sub.id ? 'active' : ''}" onclick="switchSub('${sub.id}')">${displayName}</button>`;

        if(added) { computePendingDues(); saveToLocal(); showToast(added+" सदस्य जुड़े, डुप्लीकेट:"+dup); switchSub('memberList'); }
        else showToast("कोई नया नहीं",true);
    }

        members.forEach(m => {

    function openPaymentModal(memberId, year) {
        let m = appData.members.find(x=>x.id===memberId);

    function processSinglePayment(memberId, year) {
        let m = appData.members.find(x=>x.id===memberId);

        let amount = parseInt(document.getElementById('payAmount').value);
        let mode = document.getElementById('payMode').value;

    function openBulkPaymentModal(memberId, year) {
        let m = appData.members.find(x=>x.id===memberId);
        let paidMonths = appData.donations.filter(d=>d.memberId===memberId && d.year===year && d.type==='monthly').map(d=>d.month);
        let monthsList = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];

            <button class="btn btn-secondary mt-2" onclick="closeModal()">रद्द</button>
        </div></div>`;
        document.body.insertAdjacentHTML('beforeend',html);

    function processBulkPayment(memberId, year) {
        let m = appData.members.find(x=>x.id===memberId);
        let paidMonths = appData.donations.filter(d=>d.memberId===memberId && d.year===year && d.type==='monthly').map(d=>d.month);
        let monthsList = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
        let pending = monthsList.filter(mon => !paidMonths.includes(mon));
        let mode = document.getElementById('bulkMode').value;
        for(let month of pending) {
            let receiptNo = `REC-${Date.now().toString().slice(-8)}-${month.slice(0,2)}`;
            let donation = {
                id: Date.now(), memberId, memberName: m.name, type: "monthly", month, year, amount: m.monthlyAmount, receiptNo,
                date: new Date().toISOString().slice(0,10), mode, created_by: currentUser.name, created_at: new Date().toISOString()
            };
            appData.donations.push(donation);
            generateReceiptAndWhatsApp(m, donation);
        }
        computePendingDues();
        saveToLocal();
        closeModal();
        refreshDonationUI();
        addAuditLog("BULK_PAYMENT", `${m.name} - ${pending.length} months`);
        showToast(`${pending.length} महीनों का भुगतान सफल!`);
        renderDashboard();
    }

    function renderRamcharitmanas() {
        // Calculate Pushya Nakshatra dates (simplified - Sunday and Thursday)
        let pushyaDates = [];
        for(let i = 1; i <= 60; i++) {
            let dt = new Date();
            dt.setDate(dt.getDate() + i);
            if(dt.getDay() === 0 || dt.getDay() === 4) {
                pushyaDates.push(dt.toISOString().split('T')[0]);
                if(pushyaDates.length >= 6) break;
            }
        }
        
        let organizersHtml = appData.ramcharitmanas.map(p => `
            <div class="path-item">
                <div><strong style="color:var(--saffron);">📅 ${p.date}</strong><br>
                <span style="color:var(--teal);">आयोजक: ${p.organizer}</span><br>
                <span style="color:var(--gray);">गाँव: ${p.village} | मोबाइल: ${p.mobile} | योगदान: ₹${p.contribution}</span>
                <div class="created-by" style="font-size:10px;">बनाया: ${p.created_by}</div></div>
                <div>
                    <button class="btn-sm btn-primary" onclick="editPath(${p.id})">✏️</button>
                    <button class="btn-sm btn-danger" onclick="deletePath(${p.id})">🗑️</button>
                    <button class="btn-sm btn-success" onclick="sendPathInvite(${p.id})">📱 आमंत्रण</button>
                </div>
            </div>
        `).join('');
        
        let html = `
            <div class="card"><div class="card-title">📅 पुष्य नक्षत्र कैलेंडर (आगामी पाठ तिथियाँ)</div>
                <div class="flex" style="gap:10px; flex-wrap:wrap;">${pushyaDates.map(d => `<span class="badge-upcoming" style="padding:8px 15px;">📖 ${d}</span>`).join('')}</div>
            </div>
            <div class="card"><div class="card-title">👥 आयोजक सूची (रामचरितमानस पाठ)</div>
                <button class="btn btn-primary mb-2" onclick="openPathModal()">+ नया आयोजक / पाठ शेड्यूल</button>
                <div id="organizersList">${organizersHtml || '<p style="color:var(--gray);">कोई आयोजक नहीं</p>'}</div>
            </div>
        `;
        document.getElementById('contentArea').innerHTML = html;
    }

    function savePath(id) {
        if(id) {
            let p = appData.ramcharitmanas.find(p => p.id === id);
            let reason = document.getElementById('editReasonPath')?.value || "No reason";
            let oldData = { date: p.date, organizer: p.organizer, mobile: p.mobile, village: p.village, contribution: p.contribution };
            p.date = document.getElementById('pathDate').value;
            p.organizer = document.getElementById('pathOrg').value;
            p.mobile = document.getElementById('pathMobile').value;
            p.village = document.getElementById('pathVillage').value;
            p.contribution = parseInt(document.getElementById('pathContribution').value) || 0;
            p.updated_by = currentUser?.name;
            p.updated_at = new Date().toISOString();
            addEditHistory(p, 'PATH', oldData, { date: p.date, organizer: p.organizer, mobile: p.mobile, village: p.village, contribution: p.contribution }, reason);
            showToast('पाठ अपडेट हुआ');
        } else {
            let path = {
                id: Date.now(), date: document.getElementById('pathDate').value,
                organizer: document.getElementById('pathOrg').value,
                mobile: document.getElementById('pathMobile').value,
                village: document.getElementById('pathVillage').value,
                contribution: parseInt(document.getElementById('pathContribution').value) || 0,
                status: 'upcoming', created_by: currentUser?.name, created_at: new Date().toISOString()
            };
            appData.ramcharitmanas.push(path);
            addAuditLog("ADD_PATH", path.organizer, path.id, 'PATH');
            showToast('पाठ शेड्यूल हुआ');
        }
        saveData();
        closeModal();
        renderRamcharitmanas();
    }

    function restoreFromFile() {
        let input = document.createElement('input'); input.type='file'; input.accept='application/json';
        input.onchange = e => {
            let file = e.target.files[0];
            let reader = new FileReader();
            reader.onload = ev => {
                try{
                    let restored = JSON.parse(ev.target.result);
                    appData = restored;
                    initDefaultUsers();
                    saveToLocal();
                    showToast("रिस्टोर सफल! पृष्ठ रिफ्रेश होगा");
                    location.reload();
                } catch(e){ alert("फाइल दूषित");}
            };
            reader.readAsText(file);
        };
        input.click();
    }

    }

    function changeTheme(color) { document.documentElement.style.setProperty('--saffron', color); showToast("थीम बदली गई"); }
    function toggleDarkMode() { document.body.classList.toggle('dark'); showToast(document.body.classList.contains('dark') ? "डार्क मोड ऑन" : "लाइट मोड ऑन"); }

    // ==================== LOGIN ====================
    function doLogin() {
        let email = document.getElementById('loginEmail').value;
        let pwd = document.getElementById('loginPassword').value;
        let user = appData.users.find(u=>u.email===email && u.password===pwd);
        if(user) {
            currentUser = user;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('userName').innerText = user.name;
            document.getElementById('userRoleBadge').innerText = user.role;
            document.getElementById('userRoleBadge').className = `role-${user.role}`;
            if(appData.settings.logo) document.getElementById('committeeLogoImg').src = appData.settings.logo;
            computePendingDues();
            renderNavigation();
            renderCurrentPage();
            addAuditLog("LOGIN", "successful");
        } else { document.getElementById('loginError').innerText = "गलत लॉगिन"; }
    }

    function doLogout() {
        currentUser = null;
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
        navigationStack = [];
    }

    // Dark mode toggle
    document.getElementById('darkModeToggle')?.addEventListener('click', toggleDarkMode);
    
    // Initialize
    loadFromLocal();
</script>
</body>
</html>
