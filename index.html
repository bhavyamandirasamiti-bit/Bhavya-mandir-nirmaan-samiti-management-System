        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js').then(function(registration) {
                    console.log('ServiceWorker registration successful');
                }, function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
        
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('installAppBtn');
            if(installBtn) installBtn.style.display = 'flex';
        });
        
        function installApp() {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    }
                    deferredPrompt = null;
                    const installBtn = document.getElementById('installAppBtn');
                    if(installBtn) installBtn.style.display = 'none';
                });
            }
        }
        
        // Google Drive Backup
        const GOOGLE_DRIVE_FOLDER_ID = "1ekyVapMl-0Aq-QFVAL1ej5cjmzQmOQ0x";
        function backupToGoogleDrive() {
            let dataStr = JSON.stringify(appData);
            let blob = new Blob([dataStr], {type: 'application/json'});
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = `mandir_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast("बैकअप डाउनलोड हो गया, आप इसे Google Drive में सेव कर सकते हैं");

    function computePendingDues() {
        try {
            const now = new Date();
            const curYear = now.getFullYear();
            const curMonthIdx = now.getMonth();
            appData.members.forEach(m => {
                if(m.status !== 'active') return;
                const join = new Date(m.joinDate);
                let totalExpected = 0;
                for(let y = join.getFullYear(); y <= curYear; y++) {
                    let startM = (y === join.getFullYear()) ? join.getMonth() : 0;
                    let endM = (y === curYear) ? curMonthIdx : 11;
                    for(let mo = startM; mo <= endM; mo++) totalExpected += m.monthlyAmount;
                }
                const paid = appData.donations.filter(d => d.memberId === m.id && d.type === 'monthly').reduce((s,d)=>s+d.amount,0);
                m.pending = totalExpected - paid;
                if(m.pending < 0) m.pending = 0;
            });
            saveToLocal();
        } catch(e) { console.error("Compute pending error:", e); }
    }

    function renderNavigation() {
        let mainHtml = '';
        mainTabsList.forEach(tab => {

        });
        document.getElementById('mainTabs').innerHTML = mainHtml;
        let subHtml = '';
        if(subTabsConfig[currentMain]) {

                subHtml += `<button class="sub-tab ${currentSub === sub.id ? 'active' : ''}" onclick="switchSub('${sub.id}')">${getText(sub.id)}</button>`;
            });

        try {
            let m = appData.members.find(x=>x.id===id);

                let paidMonths = appData.donations.filter(d => d.memberId === m.id && d.year === year && d.type === 'monthly').map(d => d.month);
                let monthStatus = '';

                monthsList.forEach(mon => {
                    let isPaid = paidMonths.includes(mon);
                    monthStatus += `🗓️ ${mon}: ${isPaid ? '✅ ₹200 (जमा है)' : '⭕ ₹200 शेष राशि (देय है)'}\n`;

                window.open(`https://wa.me/91${m.mobile}?text=${encodeURIComponent(msg)}`, '_blank');

                addAuditLog("REMINDER_SENT", m.name);

        let newValue = document.getElementById('newValue').value;
        let reason = document.getElementById('requestReason').value;

        appData.pendingEdits.push({
            id: Date.now(), memberId, memberName: m.name, field, oldValue, newValue, reason,
            requestedBy: currentUser.name, requestedAt: new Date().toISOString(), status: 'pending'
        });

    function approveEdit(id) {
        let req = appData.pendingEdits.find(r => r.id === id);
        let m = appData.members.find(x=>x.id === req.memberId);
        let oldData = { [req.field]: m[req.field] };
        m[req.field] = req.newValue;
        m.updated_by = currentUser.name;
        m.updated_at = new Date().toISOString();
        addEditHistory(m, 'MEMBER', oldData, { [req.field]: req.newValue }, req.reason);
        appData.pendingEdits = appData.pendingEdits.filter(r => r.id !== id);
        saveToLocal(); renderMemberList(); showToast("एडिट approved");
        addAuditLog("EDIT_APPROVED", `${currentUser.name} approved edit for ${m.name}`);
    }

    function processBulkImport() {
        let text = document.getElementById('bulkData').value;
        let lines = text.split('\n');
        let added = 0, invalid = 0;
        for(let line of lines) {
            line = line.trim();
            if(!line) continue;
            let parts = line.split(',');
            if(parts.length >= 1) {
                let name = parts[0]?.trim() || '';
                let father = parts[1]?.trim() || '';
                let mobile = parts[2]?.trim() || '';
                let village = parts[3]?.trim() || '';
                let amount = parts[4] ? parseInt(parts[4].trim()) : appData.settings.defaultMonthly;
                if(name && mobile) {
                    appData.members.push({
                        id: Date.now()+Math.random(), name, father, mobile, village,
                        monthlyAmount: amount, joinDate: new Date().toISOString().slice(0,10),
                        status: 'active', photo: "", created_by: currentUser.name, created_at: new Date().toISOString(), editHistory: []
                    });
                    added++;
                } else invalid++;
            } else invalid++;
        }
        if(added) { computePendingDues(); saveToLocal(); showToast(added+" सदस्य जुड़े, अवैध:"+invalid); switchSub('memberList'); }
        else showToast("कोई नया नहीं", true);
    }

    function saveCommittee(id) {
        let year = parseInt(document.getElementById('committeeYear').value);
        let memberDivs = document.querySelectorAll('#committeeMembersList .flex');
        let members = [];
        memberDivs.forEach(div => {
            let inputs = div.querySelectorAll('input');
            if(inputs[0] && inputs[1] && inputs[0].value && inputs[1].value) {
                members.push({ post: inputs[0].value, name: inputs[1].value });
            }
        });
        if(id) {
            let c = appData.committees.find(c => c.id === id);
            let reason = document.getElementById('committeeReason')?.value || "No reason";
            let oldData = { year: c.year, members: c.members };
            c.year = year; c.members = members;
            c.updated_by = currentUser.name; c.updated_at = new Date().toISOString();
            addEditHistory(c, 'COMMITTEE', oldData, { year: year, members: members }, reason);
            showToast('समिति अपडेट हुई');
        } else {
            appData.committees.push({ id: Date.now(), year: year, members: members, created_by: currentUser.name, created_at: new Date().toISOString() });
            showToast('नई समिति जुड़ी');
        }
        saveToLocal(); closeModal(); renderCommittees(); addAuditLog(id ? "EDIT_COMMITTEE" : "ADD_COMMITTEE", `Year ${year}`);

    function openDonationForMember(memberId) {
        switchSub('donations');
        setTimeout(() => {
            if(document.getElementById('donationYearSelect')) {
                let year = parseInt(document.getElementById('donationYearSelect').value);
                openPaymentModal(memberId, year);
            }
        }, 100);
    }

    function openPaymentModal(memberId, year) {
        let m = appData.members.find(x=>x.id===memberId);
        let paidMonths = appData.donations.filter(d=>d.memberId===memberId && d.year===year && d.type==='monthly').map(d=>d.month);
        let monthsList = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
        let pendingMonths = monthsList.filter(mon => !paidMonths.includes(mon));
        if(pendingMonths.length === 0) { showToast("सभी जमा हैं", true); return; }
        
        let checkboxes = pendingMonths.map(mon => `<div class="checklist-item"><input type="checkbox" value="${mon}" class="month-checkbox"> <label>${mon}</label></div>`).join('');
        let html = `<div class="modal" id="paymentModal"><div class="modal-content"><h3>💰 भुगतान - ${m.name}</h3>
            <div class="form-group"><label>बकाया महीने (चुनें)</label>
                <div class="checklist"><div class="checklist-item"><input type="checkbox" id="selectAllMonths"> <strong>सभी का चयन करें</strong></div>${checkboxes}</div>
            </div>
            <div class="form-group"><label>राशि (₹)</label><input id="payAmount" class="form-control" value="${m.monthlyAmount * pendingMonths.length}" readonly></div>
            <div class="form-group"><label>मोड</label><select id="payMode" class="form-control"><option>Cash</option><option>UPI</option><option>Bank Transfer</option></select></div>
            <button class="btn btn-primary" onclick="processPaymentWithMonths(${memberId}, ${year})">दान करें & रसीद</button>
            <button class="btn btn-secondary mt-2" onclick="closeModal()">रद्द</button>
        </div></div>`;
        document.body.insertAdjacentHTML('beforeend', html);
        
        document.getElementById('selectAllMonths').addEventListener('change', function(e) {
            document.querySelectorAll('.month-checkbox').forEach(cb => cb.checked = e.target.checked);
            updatePaymentAmount(m.monthlyAmount);
        });
        document.querySelectorAll('.month-checkbox').forEach(cb => {
            cb.addEventListener('change', () => updatePaymentAmount(m.monthlyAmount));
        });
    }
    
    function updatePaymentAmount(monthlyAmount) {
        let selected = document.querySelectorAll('.month-checkbox:checked').length;
        document.getElementById('payAmount').value = monthlyAmount * selected;
    }

    function processPaymentWithMonths(memberId, year) {
        let m = appData.members.find(x=>x.id===memberId);
        let selectedMonths = Array.from(document.querySelectorAll('.month-checkbox:checked')).map(cb => cb.value);
        if(selectedMonths.length === 0) { showToast("कम से कम एक महीना चुनें", true); return; }
        let mode = document.getElementById('payMode').value;
        let totalAmount = selectedMonths.length * m.monthlyAmount;
        for(let month of selectedMonths) {
            let receiptNo = `REC-${Date.now().toString().slice(-8)}-${month.slice(0,2)}`;
            let donation = {
                id: Date.now(), memberId, memberName: m.name, type: "monthly", month, year, amount: m.monthlyAmount, receiptNo,
                date: new Date().toISOString().slice(0,10), mode, created_by: currentUser.name, created_at: new Date().toISOString()
            };
            appData.donations.push(donation);
            generateReceiptAndWhatsApp(m, donation);
        }
        computePendingDues(); saveToLocal(); closeModal(); refreshDonationUI(); renderDashboard();
        showToast(`${selectedMonths.length} महीनों का ₹${totalAmount} का भुगतान सफल!`);
        addAuditLog("BULK_PAYMENT", `${m.name} - ${selectedMonths.length} months`);
    }

    function savePath(id) {
        if(id) {
            let p = appData.ramcharitmanas.find(p => p.id === id);
            let reason = document.getElementById('editReasonPath')?.value || "No reason";
            let oldData = { date: p.date, organizer: p.organizer, mobile: p.mobile, village: p.village, contribution: p.contribution };
            p.date = document.getElementById('pathDate').value;
            p.organizer = document.getElementById('pathOrg').value;
            p.mobile = document.getElementById('pathMobile').value;
            p.village = document.getElementById('pathVillage').value;
            p.contribution = parseInt(document.getElementById('pathContribution').value) || 0;
            p.updated_by = currentUser?.name; p.updated_at = new Date().toISOString();
            addEditHistory(p, 'PATH', oldData, { date: p.date, organizer: p.organizer, mobile: p.mobile, village: p.village, contribution: p.contribution }, reason);
            showToast('पाठ अपडेट हुआ');
        } else {
            let path = {
                id: Date.now(), date: document.getElementById('pathDate').value, organizer: document.getElementById('pathOrg').value,
                mobile: document.getElementById('pathMobile').value, village: document.getElementById('pathVillage').value,
                contribution: parseInt(document.getElementById('pathContribution').value) || 0,
                status: 'upcoming', created_by: currentUser?.name, created_at: new Date().toISOString()
            };
            appData.ramcharitmanas.push(path);
            addAuditLog("ADD_PATH", path.organizer, path.id);
            showToast('पाठ शेड्यूल हुआ');
        }
        saveToLocal(); closeModal(); renderRamcharitmanas();
    }

                <div class="form-group"><label>UPI ID</label><input id="setUpi" class="form-control" value="${appData.settings.upiId}"></div>
                <div class="form-group"><label>डिफ़ॉल्ट राशि</label><input id="setDef" type="number" class="form-control" value="${appData.settings.defaultMonthly}"></div>
                <div class="form-group"><label>अध्यक्ष</label><input id="president" class="form-control" value="${appData.settings.president}"></div>
                <div class="form-group"><label>सचिव</label><input id="secretary" class="form-control" value="${appData.settings.secretary}"></div>
                <div class="form-group"><label>Google Drive Folder ID</label><input id="googleDriveFolder" class="form-control" value="${appData.settings.googleDriveFolder || '1ekyVapMl-0Aq-QFVAL1ej5cjmzQmOQ0x'}"></div>
                <div class="form-group"><label>लोगो</label><input type="file" id="logoUpload" accept="image/*"></div>
                <button class="btn btn-primary" onclick="saveGeneralSettings()">सेव करें</button>
                <div id="logoPreview" class="mt-2"></div>
            </div>
        `;
        if(appData.settings.logo) document.getElementById('logoPreview').innerHTML = `<img src="${appData.settings.logo}" style="width:60px;height:60px;border-radius:50%;">`;
    }

    function saveGeneralSettings() {
        let logoFile = document.getElementById('logoUpload').files[0];
        let saveSettings = (logoUrl) => {
            if(logoUrl) appData.settings.logo = logoUrl;
            appData.settings.committeeName = document.getElementById('setName').value;
            appData.settings.upiId = document.getElementById('setUpi').value;
            appData.settings.defaultMonthly = parseInt(document.getElementById('setDef').value);
            appData.settings.president = document.getElementById('president').value;
            appData.settings.secretary = document.getElementById('secretary').value;
            appData.settings.googleDriveFolder = document.getElementById('googleDriveFolder').value;
            saveToLocal();
            document.getElementById('headerTitle').innerText = appData.settings.committeeName;
            if(appData.settings.logo) document.getElementById('committeeLogoImg').src = appData.settings.logo;
            showToast("सेटिंग्स सेव हुईं");
        };
        if(logoFile) { let reader = new FileReader(); reader.onload = (e) => saveSettings(e.target.result); reader.readAsDataURL(logoFile); }
        else { saveSettings(null); }
    }

    function renderSocialSettings() {
        document.getElementById('contentArea').innerHTML = `
            <div class="card"><div class="card-title">🔗 सोशल मीडिया सेटिंग्स</div>
                <div class="form-group"><label>Facebook Link</label><input id="facebookLink" class="form-control" value="${appData.settings.facebookLink || ''}" placeholder="https://facebook.com/..."></div>
                <div class="form-group"><label>Instagram Link</label><input id="instagramLink" class="form-control" value="${appData.settings.instagramLink || ''}" placeholder="https://instagram.com/..."></div>
                <div class="form-group"><label>YouTube Link</label><input id="youtubeLink" class="form-control" value="${appData.settings.youtubeLink || ''}" placeholder="https://youtube.com/..."></div>
                <button class="btn btn-primary" onclick="saveSocialSettings()">सेव करें</button>
            </div>
        `;
    }
    function saveSocialSettings() {
        appData.settings.facebookLink = document.getElementById('facebookLink').value;
        appData.settings.instagramLink = document.getElementById('instagramLink').value;
        appData.settings.youtubeLink = document.getElementById('youtubeLink').value;
        saveToLocal(); showToast("सोशल सेटिंग्स सेव हुईं");
    }

    function renderGoogleSheets() {
        document.getElementById('contentArea').innerHTML = `
            <div class="card"><div class="card-title">📊 Google Sheets</div>
                <div class="form-group"><label>Sheet ID</label><input id="sheetId" class="form-control" value="${appData.settings.googleSheetId || ''}" placeholder="1ABCdefghijklmnop..."></div>
                <button class="btn btn-primary" onclick="saveGoogleSheets()">सेव करें</button>
                <button class="btn btn-info mt-2" onclick="syncToGoogleSheets()">सिंक करें</button>
            </div>
        `;
    }
    function saveGoogleSheets() { appData.settings.googleSheetId = document.getElementById('sheetId').value; saveToLocal(); showToast("Google Sheet ID सेव हुई"); }
    function syncToGoogleSheets() { if(!appData.settings.googleSheetId) { showToast("पहले Sheet ID सेट करें!", true); return; } showToast("सिंक शुरू..."); setTimeout(() => showToast("✅ सिंक पूरा!"), 1500); }

    function renderBackup() {
        document.getElementById('contentArea').innerHTML = `
            <div class="card"><div class="card-title">📦 बैकअप</div>
                <button class="btn btn-success" onclick="backupNow()">💾 बैकअप डाउनलोड</button>
                <button class="btn btn-info mt-2" onclick="backupToGoogleDrive()">☁️ Google Drive बैकअप</button>
                <button class="btn btn-primary mt-2" onclick="restoreFromFile()">📂 रिस्टोर (JSON)</button>
            </div>
        `;
    }
    function backupNow() { let dataStr = JSON.stringify(appData); let blob = new Blob([dataStr], {type:'application/json'}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `mandir_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); showToast("बैकअप लिया"); }
    function restoreFromFile() { let input = document.createElement('input'); input.type='file'; input.accept='application/json'; input.onchange = e => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = ev => { try { appData = JSON.parse(ev.target.result); initDefaultUsers(); saveToLocal(); showToast("रिस्टोर सफल!"); location.reload(); } catch(e){ alert("फाइल दूषित"); } }; reader.readAsText(file); }; input.click(); }

    function renderUsers() {
        if(currentUser.role !== 'super_admin') { document.getElementById('contentArea').innerHTML = '<div class="card">❌ केवल सुपर एडमिन</div>'; return; }
        let userHtml = appData.users.map(u=>`<div class="member-card"><div>${u.name} (${u.role})</div><button class="btn-sm btn-danger" onclick="deleteUser(${u.id})">🗑️</button></div>`).join('');
        document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">👥 यूजर</div><div id="usersList">${userHtml}</div><button class="btn btn-primary mt-2" onclick="openAddUserModal()">+ नया</button></div>`;
    }

    function renderTheme() {
        document.getElementById('contentArea').innerHTML = `
            <div class="card"><div class="card-title">🎨 थीम</div>
                <div class="flex"><button class="btn-sm" style="background:#FF9933;" onclick="changeTheme('#FF9933')">सफेद</button>
                <button class="btn-sm" style="background:#dc3545;color:white" onclick="changeTheme('#dc3545')">लाल</button>
                <button class="btn-sm" style="background:#28a745;color:white" onclick="changeTheme('#28a745')">हरा</button>
                <button class="btn-sm" style="background:#007bff;color:white" onclick="changeTheme('#007bff')">नीला</button></div>
                <button class="btn btn-primary mt-2" onclick="toggleDarkMode()">🌙 डार्क मोड</button>
            </div>
        `;
    }
    function changeTheme(color) { document.documentElement.style.setProperty('--saffron', color); }
    function toggleDarkMode() { document.body.classList.toggle('dark'); }

    // ==================== LOGIN ====================
    function doLogin() {
        try {
            let user = appData.users.find(u=>u.email===document.getElementById('loginEmail').value && u.password===document.getElementById('loginPassword').value);
            if(user) {
                currentUser = user;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                document.getElementById('userName').innerText = user.name;
                document.getElementById('userRoleBadge').innerText = user.role;
                if(appData.settings.logo) document.getElementById('committeeLogoImg').src = appData.settings.logo;
                computePendingDues(); renderNavigation(); renderCurrentPage(); addAuditLog("LOGIN", "successful");
            } else { document.getElementById('loginError').innerText = "गलत लॉगिन"; }
        } catch(e) { console.error("Login error:", e); showToast("लॉगिन में त्रुटि", true); }
    }
    function doLogout() { currentUser = null; document.getElementById('loginPage').style.display = 'flex'; document.getElementById('appContainer').style.display = 'none'; navigationStack = []; }

    document.getElementById('darkModeToggle')?.addEventListener('click', toggleDarkMode);
    loadFromLocal();
</script>
</body>
</html>
