<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Bhavya Mandir - Login Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fef7e8, #ffe8d6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 28px;
            padding: 40px 35px;
            max-width: 420px;
            width: 90%;
            margin: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
        }
        .logo { font-size: 60px; margin-bottom: 10px; }
        h2 { color: #FF9933; font-size: 28px; margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input {
            width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0;
            border-radius: 12px; font-size: 16px;
        }
        input:focus { outline: none; border-color: #FF9933; }
        button {
            width: 100%; padding: 14px; background: #FF9933; color: white;
            border: none; border-radius: 40px; font-size: 16px; font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #e67e22; }
        .message { margin-top: 20px; padding: 12px; border-radius: 12px; font-size: 14px; display: none; }
        .message.error { background: #fee2e2; color: #dc2626; display: block; }
        .message.success { background: #d1fae5; color: #059669; display: block; }
        hr { margin: 25px 0 15px; border: none; border-top: 1px solid #e2e8f0; }
        .info-box { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .info-box p { margin: 8px 0; font-size: 13px; }
        .info-box strong { color: #FF9933; }
        a { color: #FF9933; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🕉️</div>
        <h2>Bhavya Mandir</h2>
        <div class="subtitle">Nirman Samiti</div>
        
        <div class="form-group">
            <label>👤 यूजरनेम</label>
            <input type="text" id="username" placeholder="admin / superadmin / operator">
        </div>
        <div class="form-group">
            <label>🔒 पासवर्ड</label>
            <input type="password" id="password" placeholder="पासवर्ड डालें">
        </div>
        
        <button onclick="doLogin()">🔐 लॉगिन करें</button>
        
        <div id="message" class="message"></div>
        
        <div style="margin-top: 15px;">
            <a href="#" onclick="showForgotPassword()">पासवर्ड भूल गए?</a>
        </div>
        
        <hr>
        
        <div class="info-box">
            <p><strong>📢 लॉगिन जानकारी:</strong></p>
            <p>🔑 <strong>admin</strong> / <strong>admin123</strong></p>
            <p>🔑 <strong>superadmin</strong> / <strong>Bhavya@2026</strong></p>
            <p>🔑 <strong>operator</strong> / <strong>Seva@2026</strong></p>
        </div>
    </div>

    <script>
        // ==================== USERS DATABASE ====================
        // आप इन मोबाइल नंबर को बाद में बदल सकते हैं
        const USERS = [
            { username: "superadmin", password: "Bhavya@2026", role: "super_admin", name: "राजेंद्र यादव", mobile: "9876543210" },
            { username: "admin", password: "admin123", role: "admin", name: "अरविंद सिंह यादव", mobile: "9876543211" },
            { username: "operator", password: "Seva@2026", role: "operator", name: "ऑपरेटर", mobile: "9876543212" }
        ];
        
        function doLogin() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const messageDiv = document.getElementById("message");
            
            if (username === "") {
                messageDiv.className = "message error";
                messageDiv.innerHTML = "❌ कृपया यूजरनेम डालें!";
                return;
            }
            
            if (password === "") {
                messageDiv.className = "message error";
                messageDiv.innerHTML = "❌ कृपया पासवर्ड डालें!";
                return;
            }
            
            // Find user - सीधा compare
            let foundUser = null;
            for (let i = 0; i < USERS.length; i++) {
                if (USERS[i].username === username && USERS[i].password === password) {
                    foundUser = USERS[i];
                    break;
                }
            }
            
            if (foundUser) {
                messageDiv.className = "message success";
                messageDiv.innerHTML = `✅ लॉगिन सफल! स्वागत है ${foundUser.name}<br>रोल: ${foundUser.role}<br><br>अब पूरा ऐप खुलेगा...`;
                
                // Save to session
                sessionStorage.setItem("currentUser", JSON.stringify(foundUser));
                
                setTimeout(function() {
                    alert("✅ लॉगिन सफल!\n\nयूजर: " + foundUser.username + "\nरोल: " + foundUser.role);
                    // यहाँ पूरा ऐप डालेंगे
                }, 1000);
            } else {
                messageDiv.className = "message error";
                messageDiv.innerHTML = "❌ गलत यूजरनेम या पासवर्ड!";
            }
        }
        
        function showForgotPassword() {
            const newPassword = prompt("नया पासवर्ड डालें (कम से कम 4 अक्षर):");
            if (newPassword && newPassword.length >= 4) {
                // यहाँ आपको अपना मोबाइल नंबर डालना होगा
                const mobile = prompt("अपना रजिस्टर्ड मोबाइल नंबर डालें (10 अंक):");
                if (mobile && mobile.length === 10) {
                    // यहाँ चेक करें कि यह मोबाइल किस यूजर से मैच करता है
                    let userFound = null;
                    for (let i = 0; i < USERS.length; i++) {
                        if (USERS[i].mobile === mobile) {
                            userFound = USERS[i];
                            break;
                        }
                    }
                    if (userFound) {
                        userFound.password = newPassword;
                        alert(`✅ ${userFound.username} का पासवर्ड बदल गया!\nनया पासवर्ड: ${newPassword}`);
                    } else {
                        alert("❌ इस मोबाइल नंबर से कोई यूजर रजिस्टर्ड नहीं है!");
                    }
                } else {
                    alert("❌ सही मोबाइल नंबर डालें (10 अंक)!");
                }
            } else {
                alert("❌ पासवर्ड कम से कम 4 अक्षर का होना चाहिए!");
            }
        }
        
        // Check if already logged in
        const savedUser = sessionStorage.getItem("currentUser");
        if (savedUser) {
            const user = JSON.parse(savedUser);
            alert(`आप पहले से लॉगिन हैं!\nयूजर: ${user.username}\nनया लॉगिन करने के लिए पेज refresh करें।`);
        }
    </script>
</body>
</html>
