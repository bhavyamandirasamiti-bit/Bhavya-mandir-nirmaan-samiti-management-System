<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Bhavya Mandir - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fef7e8, #ffe8d6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 28px;
            padding: 45px 40px;
            max-width: 450px;
            width: 90%;
            margin: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
        }
        .logo {
            font-size: 70px;
            margin-bottom: 10px;
        }
        h2 {
            color: #FF9933;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #FF9933;
            box-shadow: 0 0 0 3px rgba(255,153,51,0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #FF9933;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #e67e22;
            transform: scale(0.98);
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }
        .message.error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }
        .message.success {
            background: #d1fae5;
            color: #059669;
            display: block;
        }
        hr {
            margin: 25px 0 15px;
            border: none;
            border-top: 1px solid #e2e8f0;
        }
        .info-box {
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }
        .info-box p {
            margin: 8px 0;
            font-size: 13px;
        }
        .info-box strong {
            color: #FF9933;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🕉️</div>
        <h2>Bhavya Mandir</h2>
        <div class="subtitle">Nirman Samiti</div>
        
        <div class="form-group">
            <label>👤 यूजरनेम</label>
            <input type="text" id="username" placeholder="admin / superadmin / operator">
        </div>
        <div class="form-group">
            <label>🔒 पासवर्ड</label>
            <input type="password" id="password" placeholder="पासवर्ड डालें">
        </div>
        
        <button onclick="doLogin()">🔐 लॉगिन करें</button>
        
        <div id="message" class="message"></div>
        
        <hr>
        
        <div class="info-box">
            <p><strong>📢 लॉगिन जानकारी:</strong></p>
            <p>🔑 <strong>admin</strong> / <strong>ramram123</strong></p>
            <p>🔑 <strong>superadmin</strong> / <strong>Bhavya@2026</strong></p>
            <p>🔑 <strong>operator</strong> / <strong>Seva@2026</strong></p>
            <p style="margin-top: 10px; font-size: 12px; color: #888;">⬆️ इनमें से कोई भी यूजरनेम और पासवर्ड डालकर लॉगिन करें</p>
        </div>
    </div>

    <script>
        // ==================== USERS DATABASE ====================
        const USERS = [
            { username: "superadmin", password: "Bhavya@2026", role: "super_admin", name: "राजेंद्र यादव" },
            { username: "admin", password: "ramram123", role: "admin", name: "अरविंद सिंह यादव" },
            { username: "operator", password: "Seva@2026", role: "operator", name: "ऑपरेटर" }
        ];
        
        function doLogin() {
            // Get values
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const messageDiv = document.getElementById("message");
            
            // Validation
            if (username === "") {
                messageDiv.className = "message error";
                messageDiv.innerHTML = "❌ कृपया यूजरनेम डालें!";
                return;
            }
            
            if (password === "") {
                messageDiv.className = "message error";
                messageDiv.innerHTML = "❌ कृपया पासवर्ड डालें!";
                return;
            }
            
            // Find user
            let foundUser = null;
            for (let i = 0; i < USERS.length; i++) {
                if (USERS[i].username === username && USERS[i].password === password) {
                    foundUser = USERS[i];
                    break;
                }
            }
            
            // Check result
            if (foundUser) {
                messageDiv.className = "message success";
                messageDiv.innerHTML = `✅ लॉगिन सफल! स्वागत है ${foundUser.name}<br>रोल: ${foundUser.role}<br><br>अब पूरा ऐप लोड होगा...`;
                
                // Save to session
                sessionStorage.setItem("currentUser", JSON.stringify(foundUser));
                
                // Show dashboard after 1 second
                setTimeout(function() {
                    showDashboard(foundUser);
                }, 1000);
            } else {
                messageDiv.className = "message error";
                messageDiv.innerHTML = "❌ गलत यूजरनेम या पासवर्ड!<br>कृपया सही जानकारी डालें।";
            }
        }
        
        function showDashboard(user) {
            // Clear login screen and show dashboard
            document.body.innerHTML = `
                <div style="max-width: 800px; margin: 50px auto; padding: 30px; background: white; border-radius: 24px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                    <div style="font-size: 60px;">🕉️</div>
                    <h1 style="color: #FF9933;">Bhavya Mandir Nirman Samiti</h1>
                    <hr style="margin: 20px 0;">
                    <h2>✅ लॉगिन सफल!</h2>
                    <p style="font-size: 18px; margin: 20px 0;">स्वागत है, <strong>${user.name}</strong></p>
                    <p>📌 यूजरनेम: ${user.username}</p>
                    <p>📌 रोल: ${user.role === 'super_admin' ? '🇮🇳 सुपर एडमिन' : (user.role === 'admin' ? '👑 एडमिन' : '🔧 ऑपरेटर')}</p>
                    <button onclick="logout()" style="margin-top: 30px; padding: 12px 30px; background: #FF9933; color: white; border: none; border-radius: 40px; font-size: 16px; cursor: pointer;">🚪 लॉगआउट करें</button>
                </div>
            `;
        }
        
        function logout() {
            sessionStorage.removeItem("currentUser");
            location.reload();
        }
        
        // Check if already logged in
        const savedUser = sessionStorage.getItem("currentUser");
        if (savedUser) {
            const user = JSON.parse(savedUser);
            showDashboard(user);
        }
    </script>
</body>
</html>
